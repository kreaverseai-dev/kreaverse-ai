<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Upload File - Kreaverse AI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div class="logo-container">
            <i class="fa-solid fa-cloud-arrow-up logo-icon"></i>
            <span class="logo-text">Cloud Upload</span>
        </div>
        <button id="theme-toggle" class="theme-btn"><i class="fa-solid fa-moon"></i></button>
    </nav>

    <main class="container">
        <header class="hero">
            <h1>Penyimpanan Cloud.</h1>
            <p>Unggah gambar atau video Anda dengan aman menggunakan infrastruktur Cloudinary.</p>
        </header>

        <div class="upload-card">
            <div id="drop-area" class="drop-area">
                <i class="fa-solid fa-file-arrow-up drop-icon"></i>
                <p>Klik atau Seret file ke sini</p>
                <span class="file-info">Maksimal 10MB (Gambar/Video)</span>
                <input type="file" id="file-input" accept="image/*,video/*" hidden>
            </div>
            
            <div id="preview-container" class="preview-container hidden">
                <p id="file-name-display" class="file-name-display"></p>
                <button id="upload-btn" class="primary-btn">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Unggah File Sekarang
                </button>
            </div>
        </div>

        <div id="result-container" class="result-container hidden">
            <!-- Hasil link akan muncul di sini -->
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Kreaverse AI. All rights reserved.</p>
    </footer>

    <div id="watermark" class="watermark">Kreaverse AI</div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../script.js"></script>
    <script src="script.js"></script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="200" height="200">
  <defs>
    <!-- Gradasi Warna Premium Flixa (Ungu ke Pink Neon) -->
    <linearGradient id="flixaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7F00FF" /> <!-- Ungu Terang -->
      <stop offset="100%" stop-color="#FF007F" /> <!-- Pink Neon -->
    </linearGradient>
  </defs>

  <!-- Latar Belakang Putih Bersih -->
  <rect width="500" height="500" rx="115" fill="#FFFFFF"/>
  
  <!-- Huruf F (Tebal, Miring/Italic untuk kesan dinamis) -->
  <text x="48%" y="52%" font-family="'Arial Black', 'Montserrat', sans-serif" font-size="320" font-weight="900" font-style="italic" fill="url(#flixaGradient)" text-anchor="middle" dominant-baseline="central">F</text>
</svg>
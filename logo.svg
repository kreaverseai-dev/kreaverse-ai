<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="200" height="200">
  <!-- Latar Belakang Hitam (Kotak melengkung ala aplikasi) -->
  <rect width="500" height="500" rx="115" fill="#000000"/>
  
  <!-- Grup Huruf K dengan Efek Glitch TikTok -->
  <g font-family="'Arial Black', 'Proxima Nova', sans-serif" font-size="320" font-weight="900" text-anchor="middle" dominant-baseline="central">
    <!-- Bayangan Cyan (Kiri Atas) -->
    <text x="47%" y="49%" fill="#25F4EE">K</text>
    <!-- Bayangan Merah Neon (Kanan Bawah) -->
    <text x="53%" y="51%" fill="#FE2C55">K</text>
    <!-- Huruf Utama Putih (Tengah) -->
    <text x="50%" y="50%" fill="#FFFFFF">K</text>
  </g>
</svg>
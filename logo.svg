<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="200" height="200">
  <defs>
    <!-- Gradasi Premium ala Soniva -->
    <linearGradient id="flixaPremium" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A1449" />
      <stop offset="50%" stop-color="#7B2956" />
      <stop offset="100%" stop-color="#D95040" />
    </linearGradient>
  </defs>

  <!-- Latar Belakang Kotak Penuh -->
  <rect width="500" height="500" fill="url(#flixaPremium)"/>
  
  <!-- Tiang 'f' Abstrak (Meliuk halus seperti pita/nada musik) -->
  <path d="M 320 160 
           C 320 60, 190 60, 190 200 
           C 190 290, 230 320, 230 400" 
        stroke="#FFFFFF" 
        stroke-width="70" 
        stroke-linecap="round" 
        fill="none" />
        
  <!-- Garis Tengah 'f' (Melengkung dinamis, bukan garis lurus) -->
  <path d="M 120 250 
           Q 210 200 300 250" 
        stroke="#FFFFFF" 
        stroke-width="70" 
        stroke-linecap="round" 
        fill="none" />
</svg>
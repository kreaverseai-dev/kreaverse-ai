<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="200" height="200">
  <defs>
    <!-- Gradasi Warna Premium ala Soniva (Ungu ke Pink/Oranye) -->
    <linearGradient id="sonivaStyle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A00E0" /> <!-- Ungu Tua -->
      <stop offset="50%" stop-color="#8E2DE2" /> <!-- Ungu Terang -->
      <stop offset="100%" stop-color="#FF007F" /> <!-- Pink Neon -->
    </linearGradient>
  </defs>

  <!-- Latar Belakang Kotak Melengkung -->
  <rect width="500" height="500" rx="115" fill="url(#sonivaStyle)"/>
  
  <!-- Huruf K yang elegan dan membulat -->
  <text x="50%" y="52%" font-family="'Arial Rounded MT Bold', 'Nunito', sans-serif" font-size="280" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">K</text>
</svg>
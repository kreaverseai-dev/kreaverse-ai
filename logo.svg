<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="200" height="200">
  <defs>
    <!-- Gradasi Premium ala Soniva -->
    <linearGradient id="flixaPremium" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A1449" />
      <stop offset="50%" stop-color="#7B2956" />
      <stop offset="100%" stop-color="#D95040" />
    </linearGradient>
  </defs>

  <!-- KOTAK PENUH (Tanpa rx). Ini yang akan menghilangkan pinggiran putih di HP Anda! -->
  <rect width="500" height="500" fill="url(#flixaPremium)"/>
  
  <!-- Huruf 'f' Geometris, Sangat Tebal, dan Rapi -->
  <!-- Tiang dan Lengkungan Atas (Lengkungan menggunakan lingkaran sempurna) -->
  <path d="M 245 380 
           L 245 200 
           A 80 80 0 0 1 325 120 
           L 345 120" 
        stroke="#FFFFFF" 
        stroke-width="75" 
        stroke-linecap="round" 
        fill="none" />
        
  <!-- Garis Tengah (Sangat tebal dan seimbang) -->
  <path d="M 155 240 
           L 335 240" 
        stroke="#FFFFFF" 
        stroke-width="75" 
        stroke-linecap="round" 
        fill="none" />
</svg>
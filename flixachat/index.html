<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlixaChat Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Sedikit CSS tambahan agar scrollbar terlihat rapi seperti AI Studio */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-[#f9fafb] h-screen flex flex-col font-sans text-gray-800">

    <!-- Header ala AI Studio -->
    <header class="bg-white border-b border-gray-200 px-6 py-3 flex justify-between items-center shadow-sm z-10">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 text-white p-2 rounded-lg">
                <i class="fas fa-sparkles"></i>
            </div>
            <h1 class="text-lg font-semibold text-gray-700">FlixaChat Studio</h1>
        </div>
        
        <!-- Pilihan Model (Dropdown) -->
        <div class="flex items-center gap-2">
            <span class="text-sm text-gray-500 hidden sm:inline">Model:</span>
            <select id="model-selector" class="bg-gray-50 border border-gray-300 text-gray-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2 outline-none cursor-pointer">
                <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                <option value="gpt-4o">GPT-4o</option>
                <option value="claude-3-opus">Claude 3 Opus</option>
            </select>
        </div>
    </header>

    <!-- Area Chat -->
    <main id="chat-box" class="flex-1 overflow-y-auto p-4 sm:p-8 space-y-6 flex flex-col max-w-4xl mx-auto w-full">
        <div class="text-center mt-20">
            <div class="inline-block bg-blue-100 text-blue-600 p-4 rounded-full mb-4">
                <i class="fas fa-robot text-3xl"></i>
            </div>
            <h2 class="text-2xl font-semibold text-gray-700 mb-2">Apa yang bisa saya bantu hari ini?</h2>
            <p class="text-gray-500 text-sm">Kirim pesan, upload gambar, atau lampirkan file audio/dokumen.</p>
        </div>
    </main>

    <!-- Area Input Bawah ala AI Studio -->
    <footer class="p-4 sm:p-6 max-w-4xl mx-auto w-full">
        <div class="bg-white border border-gray-300 rounded-2xl shadow-sm focus-within:ring-1 focus-within:ring-blue-500 focus-within:border-blue-500 transition-all">
            
            <!-- Tempat Preview File (Gambar/Audio) -->
            <div id="file-preview-container" class="hidden px-4 pt-4 pb-2 flex-wrap gap-3">
                <!-- Isi preview akan di-generate oleh JavaScript -->
            </div>

            <div class="flex items-end gap-2 p-2">
                <!-- Input File Tersembunyi -->
                <input type="file" id="file-input" class="hidden" accept="image/*,audio/*,video/*,.zip,.pdf">
                
                <!-- Tombol Plus / Attachment -->
                <button id="attach-btn" class="p-3 text-gray-500 hover:bg-gray-100 hover:text-gray-700 rounded-full transition" title="Upload File">
                    <i class="fas fa-plus text-lg"></i>
                </button>

                <!-- Kolom Ketik (Textarea agar bisa multi-baris) -->
                <textarea id="message-input" rows="1" placeholder="Ketik pesan di sini..." class="flex-1 max-h-32 py-3 px-2 bg-transparent outline-none resize-none text-gray-700 placeholder-gray-400"></textarea>

                <!-- Tombol Kirim -->
                <button id="send-btn" class="p-3 text-white bg-blue-600 hover:bg-blue-700 rounded-full transition disabled:bg-gray-300 disabled:cursor-not-allowed">
                    <i class="fas fa-arrow-up"></i>
                </button>
            </div>
        </div>
        <p class="text-center text-xs text-gray-400 mt-3">FlixaChat dapat membuat kesalahan. Harap periksa kembali info penting.</p>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const attachBtn = document.getElementById('attach-btn');
        const fileInput = document.getElementById('file-input');
        const filePreviewContainer = document.getElementById('file-preview-container');

        let selectedFile = null;

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if(this.value === '') this.style.height = 'auto';
        });

        attachBtn.addEventListener('click', () => fileInput.click());

        // Saat file dipilih (Menampilkan Thumbnail Gambar)
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                filePreviewContainer.classList.remove('hidden');
                filePreviewContainer.classList.add('flex');
                
                // Cek apakah file adalah gambar
                if (selectedFile.type.startsWith('image/')) {
                    const imageUrl = URL.createObjectURL(selectedFile);
                    filePreviewContainer.innerHTML = `
                        <div class="relative group">
                            <img src="${imageUrl}" class="h-16 w-16 object-cover rounded-lg border border-gray-200 shadow-sm">
                            <button onclick="removeFile()" class="absolute -top-2 -right-2 bg-gray-800 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100 transition"><i class="fas fa-times"></i></button>
                        </div>
                    `;
                } else {
                    // Jika bukan gambar (MP3, ZIP, dll)
                    filePreviewContainer.innerHTML = `
                        <div class="relative group flex items-center gap-2 bg-gray-100 border border-gray-200 px-3 py-2 rounded-lg">
                            <i class="fas fa-file-alt text-blue-500"></i>
                            <span class="text-sm text-gray-700 max-w-[150px] truncate">${selectedFile.name}</span>
                            <button onclick="removeFile()" class="ml-2 text-gray-500 hover:text-red-500"><i class="fas fa-times"></i></button>
                        </div>
                    `;
                }
            }
        });

        // Fungsi hapus file
        window.removeFile = function() {
            selectedFile = null;
            fileInput.value = '';
            filePreviewContainer.classList.add('hidden');
            filePreviewContainer.classList.remove('flex');
            filePreviewContainer.innerHTML = '';
        };

        // Fungsi memunculkan chat ke layar
        function appendMessage(sender, text, file = null) {
            if (chatBox.innerHTML.includes('Apa yang bisa saya bantu')) {
                chatBox.innerHTML = '';
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `flex gap-4 ${sender === 'user' ? 'flex-row-reverse' : ''}`;
            
            // Avatar
            const avatarHtml = sender === 'user' 
                ? `<div class="w-8 h-8 rounded-full bg-gray-300 flex-shrink-0 flex items-center justify-center text-gray-600"><i class="fas fa-user"></i></div>`
                : `<div class="w-8 h-8 rounded-full bg-blue-600 flex-shrink-0 flex items-center justify-center text-white"><i class="fas fa-sparkles"></i></div>`;

            // File HTML di dalam chat
            let fileHtml = '';
            if (file) {
                if (file.type.startsWith('image/')) {
                    const imageUrl = URL.createObjectURL(file);
                    fileHtml = `<img src="${imageUrl}" class="max-w-xs rounded-lg mb-2 border border-gray-200">`;
                } else {
                    fileHtml = `<div class="mb-2 inline-flex items-center gap-2 bg-gray-100 border border-gray-200 px-3 py-2 rounded-lg"><i class="fas fa-paperclip text-gray-500"></i><span class="text-sm">${file.name}</span></div><br>`;
                }
            }

            messageDiv.innerHTML = `
                ${avatarHtml}
                <div class="max-w-[80%]">
                    <div class="text-sm font-semibold text-gray-600 mb-1 ${sender === 'user' ? 'text-right' : ''}">${sender === 'user' ? 'Anda' : 'FlixaChat'}</div>
                    <div class="text-gray-800 leading-relaxed">
                        ${fileHtml}
                        <p class="whitespace-pre-wrap">${text}</p>
                    </div>
                </div>
            `;
            
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Fungsi tombol kirim
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text && !selectedFile) return;

            const fileToSend = selectedFile;
            appendMessage('user', text, fileToSend);
            
            messageInput.value = '';
            messageInput.style.height = 'auto';
            removeFile();

            // Indikator Loading
            const loadingId = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = loadingId;
            loadingDiv.className = 'flex gap-4';
            loadingDiv.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-blue-600 flex-shrink-0 flex items-center justify-center text-white"><i class="fas fa-sparkles"></i></div>
                <div class="flex items-center text-gray-400 text-sm">Sedang berpikir...</div>
            `;
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            // SIMULASI BALASAN
            setTimeout(() => {
                document.getElementById(loadingId).remove();
                let balasanAI = "Tampilan sudah di-upgrade ala Google AI Studio! Sangat bersih dan profesional. Sekarang kita tinggal menunggu dokumentasi API Kie.ai untuk menyambungkan otaknya.";
                appendMessage('ai', balasanAI);
            }, 1500);
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>

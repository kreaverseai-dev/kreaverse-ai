<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlixaChat - AI Multimodal</title>
    <!-- Menggunakan Tailwind CSS agar tampilan langsung bagus tanpa file CSS terpisah -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icon untuk tombol -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold"><i class="fas fa-robot mr-2"></i>FlixaChat AI</h1>
        <span class="text-xs bg-blue-800 px-2 py-1 rounded-full">Status: Menunggu Backend</span>
    </header>

    <!-- Area Chat -->
    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col">
        <div class="text-center text-gray-400 mt-20">
            <i class="fas fa-comments text-4xl mb-3"></i>
            <p>Mulai percakapan di FlixaChat.</p>
            <p class="text-sm">Anda bisa mengirim teks, foto, lagu (MP3), atau file ZIP.</p>
        </div>
    </main>

    <!-- Area Input Bawah -->
    <footer class="bg-white p-4 border-t border-gray-200">
        <!-- Preview File (Sembunyi jika tidak ada file) -->
        <div id="file-preview" class="hidden mb-2 text-sm text-blue-600 bg-blue-50 p-2 rounded border border-blue-100 w-fit flex items-center gap-2">
            <i class="fas fa-paperclip"></i>
            <span id="file-name">namafile.mp3</span>
            <button id="remove-file" class="text-red-500 font-bold hover:text-red-700 ml-2">&times;</button>
        </div>

        <div class="flex items-center gap-2">
            <!-- Input File Tersembunyi -->
            <input type="file" id="file-input" class="hidden" accept="image/*,audio/*,video/*,.zip,.pdf">
            
            <!-- Tombol Attachment -->
            <button id="attach-btn" class="p-3 bg-gray-100 text-gray-600 rounded-full hover:bg-gray-200 transition" title="Lampirkan File">
                <i class="fas fa-paperclip"></i>
            </button>

            <!-- Kolom Ketik -->
            <input type="text" id="message-input" placeholder="Ketik pesan atau perintah untuk file..." class="flex-1 p-3 border border-gray-300 rounded-full focus:outline-none focus:border-blue-500 text-black">

            <!-- Tombol Kirim -->
            <button id="send-btn" class="p-3 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </footer>

    <!-- Panggil file JavaScript -->
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kreaverse AI Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #000000;
            --bg-panel: #111111;
            --text-main: #ffffff;
            --accent: #ffffff;
            --playhead: #ffffff;
            --track-bg: #000000;
            --header-w: 100px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; user-select: none; -webkit-tap-highlight-color: transparent;}
        
        body { background-color: var(--bg-main); color: var(--text-main); height: 100dvh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; }

        /* MODAL EXPORT & INFO */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: none; justify-content: center; align-items: center; }
        .modal-box { background: #1c1c1e; padding: 20px; border-radius: 12px; width: 90%; max-width: 350px; text-align: left; border: 1px solid #333; }
        .modal-box h3 { margin-bottom: 15px; text-align: center; font-size: 1.2rem;}
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
        .modal-box input, .modal-box textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #444; background: #000; color: white; outline: none; font-size: 1rem;}
        .modal-box textarea { resize: none; height: 60px; }
        .modal-btn { background: white; color: black; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; font-size: 1rem;}
        .modal-btn.cancel { background: #333; color: white; margin-top: 10px;}
        .progress-bar-container { width: 100%; background: #000; height: 12px; border-radius: 6px; overflow: hidden; margin: 15px 0; border: 1px solid #444;}
        .progress-bar { width: 0%; height: 100%; background: white; transition: width 0.1s; }

        /* TOP NAVIGATION */
        .top-nav { flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; background: var(--bg-main); height: 45px; padding: 0 15px; border-bottom: 1px solid #222; }
        .timecode { font-family: monospace; font-size: 0.9rem; font-weight: bold; letter-spacing: 1px; display: flex; align-items: center; gap: 15px;}
        .top-icons { display: flex; gap: 20px; font-size: 1.1rem; color: #ccc; }
        .top-icons i { cursor: pointer; }

        /* WORKSPACE */
        .workspace { flex-grow: 1; display: flex; flex-direction: column; overflow-x: auto; overflow-y: auto; position: relative; }
        
        /* RULER */
        .ruler-container { height: 20px; background: var(--bg-main); position: sticky; top: 0; z-index: 50; border-bottom: 1px solid #333; cursor: pointer; }
        .ruler-canvas { position: absolute; left: var(--header-w); height: 100%; pointer-events: none; }
        
        .tracks-container { position: relative; width: 100%; min-height: 100%; padding-bottom: 80px;}

        /* PLAYHEAD */
        .playhead-wrapper { position: absolute; top: 0; bottom: 0; left: var(--header-w); width: 0; z-index: 100; pointer-events: none; }
        .playhead-line { position: absolute; left: 0; top: 0; bottom: 100vh; width: 1.5px; background: var(--playhead); }
        .playhead-handle { position: absolute; left: -7px; top: 2px; width: 15px; height: 15px; background: var(--playhead); border-radius: 50%; pointer-events: auto; cursor: ew-resize; touch-action: none; box-shadow: 0 0 5px rgba(0,0,0,0.5);}

        /* TRACK HEADER */
        .track { height: 90px; background: var(--track-bg); border-bottom: 1px solid #222; display: flex; position: relative; }
        .track-header { width: var(--header-w); background: var(--bg-main); position: sticky; left: 0; z-index: 40; border-right: 1px solid #333; padding: 5px; display: flex; flex-direction: column; justify-content: center; }
        
        .th-top { display: flex; align-items: center; gap: 5px; margin-bottom: 5px;}
        .track-icon { min-width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; }
        .t-name { font-size: 0.75rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: text;}
        
        .th-bottom { display: flex; gap: 5px; justify-content: flex-start; padding-left: 28px;}
        .btn-fx { background: #222; border: 1px solid #444; color: #ccc; border-radius: 12px; font-size: 9px; padding: 3px 8px; cursor: pointer; }
        .btn-mute, .btn-solo { background: #222; border: none; color: #aaa; border-radius: 3px; font-size: 10px; width: 20px; height: 20px; font-weight:bold; cursor: pointer; }
        .btn-mute.active { background: #ff3b30; color: white; }
        .btn-solo.active { background: #ffcc00; color: black; }

        /* CLIP */
        .clip { position: absolute; height: 75px; top: 7px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: grab; touch-action: none; overflow: hidden; }
        .clip.selected { border: 1.5px solid white; z-index: 10; opacity: 1; box-shadow: 0 0 10px rgba(255,255,255,0.3);}
        .clip-wave { position: absolute; width: 100%; height: 60%; opacity: 0.4; pointer-events: none; background: repeating-linear-gradient(90deg, #fff 0px, #fff 1px, transparent 1px, transparent 3px); }
        .clip-name { position: absolute; top: 2px; left: 5px; font-size: 0.65rem; font-weight: bold; color: white; z-index: 2; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); pointer-events: none;}
        
        /* FLOATING CONTEXT MENU (SEPERTI DI VIDEO) */
        .context-menu { position: absolute; background: #2c2c2e; border-radius: 8px; display: none; gap: 10px; padding: 8px 12px; z-index: 200; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transform: translate(-50%, -120%); border: 1px solid #444;}
        .context-menu i { color: white; font-size: 1.1rem; cursor: pointer; padding: 5px; }
        .context-menu i:active { opacity: 0.5; }
        
        /* TOMBOL TAMBAH BESAR (SEPERTI DI VIDEO) */
        .btn-add-track { width: 50px; height: 50px; background: #1c1c1e; border: 1px solid #333; border-radius: 12px; color: white; font-size: 1.5rem; display: flex; justify-content: center; align-items: center; margin: 10px; cursor: pointer; }

        /* BOTTOM TOOLBAR */
        .bottom-nav { flex-shrink: 0; background: var(--bg-main); border-top: 1px solid #222; padding: 10px; display: flex; justify-content: space-between; align-items: center; z-index: 60; padding-bottom: calc(10px + env(safe-area-inset-bottom));}
        .bot-tools { display: flex; gap: 15px; color: white; font-size: 1.2rem;}
        .bot-tools i { cursor: pointer; }
        .play-controls { display: flex; align-items: center; gap: 25px; }
        .play-controls i { color: white; font-size: 1.3rem; cursor: pointer; }
        .btn-record { width: 45px; height: 45px; border-radius: 50%; background: #ff3b30; border: 3px solid #000; box-shadow: 0 0 0 2px #ff3b30; display: flex; justify-content: center; align-items: center; cursor: pointer;}
        .btn-record i { color: white; font-size: 1rem; }
    </style>
</head>
<body>

    <!-- MODAL LOADING -->
    <div class="modal-overlay" id="loading-modal">
        <div class="modal-box" style="width: auto; text-align: center;">
            <i class="fa-solid fa-spinner fa-spin" style="font-size: 2rem; color: white; margin-bottom: 10px;"></i>
            <p id="loading-desc" style="color: white; margin:0;">Memproses...</p>
        </div>
    </div>

    <!-- MODAL EXPORT FORM -->
    <div class="modal-overlay" id="export-modal">
        <div class="modal-box">
            <h3 id="export-title">Simpan Project</h3>
            
            <div id="export-form">
                <div class="input-group">
                    <label>Nama File / Judul</label>
                    <input type="text" id="exp-name" placeholder="Misal: Lagu Keren">
                </div>
                <div class="input-group">
                    <label>Deskripsi (Opsional)</label>
                    <textarea id="exp-desc" placeholder="Tambahkan catatan..."></textarea>
                </div>
                <button class="modal-btn" onclick="processExport()">Simpan ke MP3/WAV</button>
                <button class="modal-btn cancel" onclick="document.getElementById('export-modal').style.display='none'">Batal</button>
            </div>

            <div id="export-progress" style="display:none; text-align:center;">
                <p>Mengekspor Audio Asli...</p>
                <div class="progress-bar-container"><div class="progress-bar" id="exp-bar"></div></div>
                <p id="exp-status" style="font-size: 0.8rem; color: #aaa;">Rendering: 0%</p>
            </div>
        </div>
    </div>

    <!-- FLOATING CONTEXT MENU -->
    <div class="context-menu" id="ctx-menu">
        <i class="fa-solid fa-trash" onclick="ctxAction('delete')" title="Hapus"></i>
        <i class="fa-solid fa-copy" onclick="ctxAction('copy')" title="Salin"></i>
        <i class="fa-solid fa-scissors" onclick="ctxAction('split')" title="Potong (Split)"></i>
    </div>

    <!-- TOP NAV -->
    <header class="top-nav">
        <div class="timecode">
            <span id="time-display">00:00.0</span>
            <i class="fa-solid fa-magnet" style="font-size:0.8rem; color:#aaa;"></i>
        </div>
        <div class="top-icons">
            <i class="fa-solid fa-sliders"></i>
            <i class="fa-solid fa-cloud-arrow-up" onclick="openExportModal()"></i>
        </div>
    </header>

    <!-- WORKSPACE -->
    <main class="workspace" id="workspace">
        <div class="ruler-container" id="ruler-container">
            <canvas class="ruler-canvas" id="ruler"></canvas>
            <div class="playhead-wrapper" id="playhead">
                <div class="playhead-handle" id="playhead-handle"></div>
                <div class="playhead-line"></div>
            </div>
        </div>
        <div class="tracks-container" id="tracks-workspace">
            <!-- Tracks Here -->
            <div class="btn-add-track" onclick="document.getElementById('audio-upload').click()">
                <i class="fa-solid fa-plus"></i>
            </div>
        </div>
    </main>

    <!-- BOTTOM TOOLBAR -->
    <div class="bottom-nav">
        <div class="bot-tools">
            <i class="fa-solid fa-sliders"></i>
            <input type="file" id="audio-upload" accept="audio/*" multiple style="display: none;">
        </div>
        
        <div class="play-controls">
            <i class="fa-solid fa-rotate-left" onclick="alert('Undo')"></i>
            <i class="fa-solid fa-backward-step" onclick="goToStart()"></i>
            <div class="btn-record" id="btn-play">
                <i class="fa-solid fa-play" id="play-icon"></i>
            </div>
            <i class="fa-solid fa-rotate-right" onclick="alert('Redo')"></i>
        </div>
        
        <div class="bot-tools">
            <i class="fa-solid fa-magnifying-glass-plus" onclick="zoomIn()"></i>
            <i class="fa-solid fa-magnifying-glass-minus" onclick="zoomOut()"></i>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. STATE & ENGINE VARIABLES
        // ==========================================
        let PPS = 30; // Pixels Per Second (Zoom level)
        const HEADER_W = 100;
        const MIN_CUT_SEC = 1.0; 
        const trackColors = ['#ff3b30', '#007aff', '#34c759', '#ff9500', '#af52de'];

        let trackCount = 0;
        let clipsData = []; // SOURCE OF TRUTH (Data driven, bukan DOM driven)
        let trackStates = {}; // Mute/Solo states

        let selectedClipId = null;
        let playheadTime = 0; // Waktu dalam detik
        let isPlaying = false;
        let playInterval;
        let startTimeContext = 0;
        let startPlayheadTime = 0;

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = new AudioContext();
        let audioBuffers = {}; 
        let activeSources = [];

        const ws = document.getElementById('workspace');
        const tracksWs = document.getElementById('tracks-workspace');
        const playhead = document.getElementById('playhead');
        const ctxMenu = document.getElementById('ctx-menu');

        // ==========================================
        // 2. WAKTU & RULER (REAL-TIME)
        // ==========================================
        function formatTime(seconds) {
            let m = Math.floor(seconds / 60);
            let s = Math.floor(seconds % 60);
            let ms = Math.floor((seconds % 1) * 10); // 1 digit milidetik
            return `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}.${ms}`;
        }

        function updateTimecode() {
            document.getElementById('time-display').innerText = formatTime(playheadTime);
        }

        function drawRuler() {
            const canvas = document.getElementById('ruler');
            const ctx = canvas.getContext('2d');
            let maxTime = 60; 
            clipsData.forEach(c => { if(c.startTime + c.duration > maxTime) maxTime = c.startTime + c.duration; });
            maxTime += 30; // buffer ruang kosong
            
            const width = maxTime * PPS;
            canvas.width = Math.max(ws.scrollWidth - HEADER_W, width);
            canvas.height = 20;
            ctx.clearRect(0, 0, canvas.width, 20);
            ctx.fillStyle = "#888";
            ctx.font = "9px Arial";
            
            for (let i = 0; i < maxTime; i++) {
                const x = i * PPS;
                if (PPS > 15 || i % 5 === 0) {
                    ctx.fillRect(x, 0, 1, 8);
                    if (i % 5 === 0) ctx.fillText(i, x + 3, 8);
                }
            }
            document.querySelector('.btn-add-track').style.left = `${HEADER_W}px`;
        }

        function setPlayhead(timeSec) {
            playheadTime = timeSec < 0 ? 0 : timeSec;
            playhead.style.left = `${HEADER_W + (playheadTime * PPS)}px`;
            updateTimecode();
        }

        // Drag Playhead
        let isDraggingPh = false;
        document.getElementById('ruler-container').addEventListener('mousedown', (e) => {
            if(isPlaying) return;
            setPlayhead((e.clientX - ws.getBoundingClientRect().left + ws.scrollLeft - HEADER_W) / PPS);
        });
        
        const phStart = (e) => { isDraggingPh = true; e.stopPropagation(); hideContextMenu(); }
        const phMove = (e) => {
            if (!isDraggingPh) return;
            let x = (e.touches ? e.touches[0].clientX : e.clientX) - ws.getBoundingClientRect().left + ws.scrollLeft - HEADER_W;
            setPlayhead(x / PPS);
        }
        const phEnd = () => { isDraggingPh = false; }
        
        document.getElementById('playhead-handle').addEventListener('mousedown', phStart);
        document.getElementById('playhead-handle').addEventListener('touchstart', phStart, {passive: true});
        document.addEventListener('mousemove', phMove); document.addEventListener('touchmove', phMove, {passive: true});
        document.addEventListener('mouseup', phEnd); document.addEventListener('touchend', phEnd);

        // ==========================================
        // 3. RENDER UI DARI DATA (DATA-DRIVEN)
        // ==========================================
        // Ini kunci agar Zoom dan Potong presisi. DOM digambar ulang berdasarkan Array clipsData.
        function renderClips() {
            // Hapus clip lama
            document.querySelectorAll('.clip').forEach(el => el.remove());
            
            clipsData.forEach(data => {
                const trackEl = document.getElementById(data.trackId);
                if(!trackEl) return;

                const clip = document.createElement('div');
                clip.className = `clip ${selectedClipId === data.id ? 'selected' : ''}`;
                clip.id = data.id;
                clip.style.background = data.color;
                clip.style.width = `${data.duration * PPS}px`;
                clip.style.left = `${HEADER_W + (data.startTime * PPS)}px`;
                
                clip.innerHTML = `<span class="clip-name">${data.name}</span><div class="clip-wave"></div>`;
                
                setupClipEvents(clip, data);
                trackEl.appendChild(clip);
            });
            drawRuler();
            if(selectedClipId) positionContextMenu(document.getElementById(selectedClipId));
        }

        // ==========================================
        // 4. AUDIO UPLOAD & ADD TRACK
        // ==========================================
        document.getElementById('audio-upload').addEventListener('change', async (e) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            
            document.getElementById('loading-modal').style.display = 'flex';
            
            for (let file of files) {
                try {
                    const arrBuffer = await file.arrayBuffer();
                    const aBuffer = await audioCtx.decodeAudioData(arrBuffer);
                    const bId = 'buf_' + Date.now() + Math.random();
                    audioBuffers[bId] = aBuffer;
                    createTrack(file.name, aBuffer.duration, bId);
                } catch (err) { alert("Format audio tidak didukung."); }
            }
            document.getElementById('loading-modal').style.display = 'none';
            e.target.value = ''; 
        });

        function createTrack(name, duration, bufferId) {
            trackCount++;
            const tId = 'trk_' + Date.now();
            const color = trackColors[(trackCount-1) % trackColors.length];
            trackStates[tId] = { mute: false, solo: false };
            
            // Buat Elemen Track
            const track = document.createElement('div');
            track.className = 'track'; track.id = tId;
            track.innerHTML = `
                <div class="track-header">
                    <div class="th-top">
                        <div class="track-icon" style="background:${color}"><i class="fa-solid fa-microphone"></i></div>
                        <span class="t-name">${name}</span>
                    </div>
                    <div class="th-bottom">
                        <button class="btn-mute" onclick="toggleState('${tId}', 'mute', this)">M</button>
                        <button class="btn-solo" onclick="toggleState('${tId}', 'solo', this)">S</button>
                        <button class="btn-fx">+Fx</button>
                    </div>
                </div>
            `;
            
            // Sisipkan sebelum tombol "+"
            tracksWs.insertBefore(track, document.querySelector('.btn-add-track'));
            
            // Masukkan data clip
            clipsData.push({
                id: 'clip_' + Date.now(),
                trackId: tId,
                bufferId: bufferId,
                name: name,
                color: color,
                startTime: 0, // di detik 0
                duration: duration,
                offset: 0 // baca audio dari detik 0
            });
            
            renderClips();
        }

        function toggleState(tId, type, btn) {
            trackStates[tId][type] = !trackStates[tId][type];
            btn.classList.toggle('active');
        }

        // ==========================================
        // 5. CLIP DRAG & FLOATING MENU
        // ==========================================
        let dClipId = null, startDragX = 0, origStartTime = 0, hasMoved = false;

        function setupClipEvents(clipEl, data) {
            const startDrag = (e) => {
                selectedClipId = data.id;
                renderClips(); // re-render untuk highlight border
                
                dClipId = data.id;
                origStartTime = data.startTime;
                hasMoved = false;
                startDragX = (e.touches ? e.touches[0].clientX : e.clientX);
                
                positionContextMenu(document.getElementById(data.id));
            };
            clipEl.addEventListener('mousedown', startDrag); 
            clipEl.addEventListener('touchstart', startDrag, {passive: true});
        }

        const moveDrag = (e) => {
            if (!dClipId) return;
            hasMoved = true;
            hideContextMenu(); // sembunyikan menu saat digeser
            
            const clientX = (e.touches ? e.touches[0].clientX : e.clientX);
            const deltaPx = clientX - startDragX;
            const deltaSec = deltaPx / PPS;
            
            const data = clipsData.find(c => c.id === dClipId);
            let newTime = origStartTime + deltaSec;
            if (newTime < 0) newTime = 0;
            data.startTime = newTime;
            
            // Update visual directly for performance
            const el = document.getElementById(dClipId);
            el.style.left = `${HEADER_W + (newTime * PPS)}px`;
        }
        
        const endDrag = () => { 
            if(dClipId && hasMoved) {
                renderClips(); // pastikan snap to grid/data final
            }
            dClipId = null; 
        }

        document.addEventListener('mousemove', moveDrag); document.addEventListener('touchmove', moveDrag, {passive: true});
        document.addEventListener('mouseup', endDrag); document.addEventListener('touchend', endDrag);

        // Deselect click outside
        ws.addEventListener('mousedown', (e) => {
            if (!e.target.closest('.clip') && !e.target.closest('.context-menu')) {
                selectedClipId = null;
                hideContextMenu();
                renderClips();
            }
        });

        function positionContextMenu(clipEl) {
            if(!clipEl) return;
            const rect = clipEl.getBoundingClientRect();
            ctxMenu.style.display = 'flex';
            ctxMenu.style.left = `${rect.left + (rect.width/2)}px`;
            ctxMenu.style.top = `${rect.top}px`;
        }
        function hideContextMenu() { ctxMenu.style.display = 'none'; }

        // --- AKSI MENU FLOAT (POTONG, HAPUS, COPY) ---
        function ctxAction(action) {
            if(!selectedClipId) return;
            const index = clipsData.findIndex(c => c.id === selectedClipId);
            const clip = clipsData[index];

            if (action === 'delete') {
                clipsData.splice(index, 1);
                selectedClipId = null;
            } 
            else if (action === 'copy') {
                clipsData.push({
                    ...clip,
                    id: 'clip_' + Date.now(),
                    startTime: clip.startTime + clip.duration + 0.5 // taruh di kanannya
                });
            }
            else if (action === 'split') {
                // Potong persis di garis playhead
                if (playheadTime > clip.startTime && playheadTime < clip.startTime + clip.duration) {
                    const dur1 = playheadTime - clip.startTime;
                    const dur2 = (clip.startTime + clip.duration) - playheadTime;
                    
                    if (dur1 < MIN_CUT_SEC || dur2 < MIN_CUT_SEC) {
                        alert(`Potongan minimal ${MIN_CUT_SEC} detik.`); return;
                    }

                    const originalOffset = clip.offset;
                    // Ubah clip pertama (kiri)
                    clip.duration = dur1;
                    
                    // Buat clip kedua (kanan)
                    clipsData.push({
                        ...clip,
                        id: 'clip_' + Date.now(),
                        startTime: playheadTime,
                        duration: dur2,
                        offset: originalOffset + dur1
                    });
                } else {
                    alert("Geser garis penanda putih (Playhead) tepat ke atas lagu ini untuk memotong.");
                }
            }
            hideContextMenu();
            renderClips();
        }

        // ==========================================
        // 6. ZOOM IN / OUT 
        // ==========================================
        function zoomIn() { if(PPS < 100) { PPS += 10; renderClips(); setPlayhead(playheadTime); } }
        function zoomOut() { if(PPS > 10) { PPS -= 10; renderClips(); setPlayhead(playheadTime); } }

        // ==========================================
        // 7. PEMUTARAN AUDIO
        // ==========================================
        function stopAllAudio() { activeSources.forEach(src => { try { src.stop(); } catch(e){} }); activeSources = []; }
        function goToStart() { stopAction(); setPlayhead(0); ws.scrollLeft = 0; }
        
        const stopAction = () => {
            isPlaying = false; clearInterval(playInterval);
            document.getElementById('play-icon').className = "fa-solid fa-play";
            document.getElementById('btn-play').style.background = "#ff3b30";
            stopAllAudio();
        };

        document.getElementById('btn-play').addEventListener('click', () => {
            if(isPlaying) { stopAction(); return; }
            
            if (audioCtx.state === 'suspended') audioCtx.resume();
            stopAllAudio(); isPlaying = true;
            document.getElementById('play-icon').className = "fa-solid fa-stop";
            document.getElementById('btn-play').style.background = "#333";
            
            // Logika Mute & Solo
            let hasSolo = Object.values(trackStates).some(t => t.solo);

            clipsData.forEach(c => {
                const ts = trackStates[c.trackId];
                if (ts.mute) return; // Muted
                if (hasSolo && !ts.solo) return; // Jika ada yang disolo, yang tidak disolo dimatikan
                
                const buffer = audioBuffers[c.bufferId];
                if (!buffer) return;

                let delay = c.startTime - playheadTime;
                let startOffset = c.offset;
                
                if (delay < 0) {
                    startOffset += Math.abs(delay);
                    delay = 0;
                }
                
                if (playheadTime < c.startTime + c.duration) {
                    const source = audioCtx.createBufferSource();
                    source.buffer = buffer;
                    source.connect(audioCtx.destination);
                    source.start(audioCtx.currentTime + delay, startOffset, c.duration);
                    activeSources.push(source);
                }
            });
            
            startTimeContext = audioCtx.currentTime; 
            startPlayheadTime = playheadTime;
            
            playInterval = setInterval(() => {
                setPlayhead(startPlayheadTime + (audioCtx.currentTime - startTimeContext));
                if (playhead.getBoundingClientRect().left > window.innerWidth - 80) ws.scrollLeft += 150;
            }, 30);
        });

        // ==========================================
        // 8. REAL EXPORT AUDIO (.WAV Asli)
        // ==========================================
        function openExportModal() {
            if(clipsData.length === 0) { alert("Tidak ada lagu untuk disimpan!"); return;}
            document.getElementById('export-modal').style.display = 'flex';
            document.getElementById('export-form').style.display = 'block';
            document.getElementById('export-progress').style.display = 'none';
        }

        async function processExport() {
            const title = document.getElementById('exp-name').value || "Project Tanpa Nama";
            document.getElementById('export-form').style.display = 'none';
            document.getElementById('export-progress').style.display = 'block';
            
            // Hitung total durasi
            let maxTime = 0;
            clipsData.forEach(c => { if(c.startTime + c.duration > maxTime) maxTime = c.startTime + c.duration; });
            
            const stat = document.getElementById('exp-status');
            const bar = document.getElementById('exp-bar');
            stat.innerText = "Menyiapkan Renderer..."; bar.style.width = "10%";
            
            // Gunakan OfflineAudioContext untuk merender (Sangat Cepat & Tanpa Suara Keluar)
            const offlineCtx = new OfflineAudioContext(2, 44100 * maxTime, 44100);
            let hasSolo = Object.values(trackStates).some(t => t.solo);

            clipsData.forEach(c => {
                const ts = trackStates[c.trackId];
                if (ts.mute) return; 
                if (hasSolo && !ts.solo) return;
                
                const buffer = audioBuffers[c.bufferId];
                if(buffer) {
                    const source = offlineCtx.createBufferSource();
                    source.buffer = buffer;
                    source.connect(offlineCtx.destination);
                    source.start(c.startTime, c.offset, c.duration);
                }
            });

            stat.innerText = "Merender Audio..."; bar.style.width = "50%";
            
            try {
                const renderedBuffer = await offlineCtx.startRendering();
                stat.innerText = "Membuat File WAV..."; bar.style.width = "90%";
                
                // Konversi Buffer ke format file WAV
                const wavBlob = bufferToWav(renderedBuffer);
                const url = URL.createObjectURL(wavBlob);
                
                // Trigger Download
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `Kreaverse AI - ${title}.wav`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                
                bar.style.width = "100%";
                stat.innerText = "Selesai!";
                setTimeout(() => { document.getElementById('export-modal').style.display = 'none'; }, 1000);
            } catch(e) {
                stat.innerText = "Gagal merender!";
            }
        }

        // Fungsi standard untuk merubah AudioBuffer ke Format .wav yang bisa didownload
        function bufferToWav(abuffer) {
            let numOfChan = abuffer.numberOfChannels,
                length = abuffer.length * numOfChan * 2 + 44,
                buffer = new ArrayBuffer(length),
                view = new DataView(buffer),
                channels = [], i, sample, offset = 0, pos = 0;

            setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157);
            setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
            setUint32(abuffer.sampleRate); setUint32(abuffer.sampleRate * 2 * numOfChan);
            setUint16(numOfChan * 2); setUint16(16); setUint32(0x61746164); setUint32(length - pos - 4);

            for(i=0; i<abuffer.numberOfChannels; i++) channels.push(abuffer.getChannelData(i));

            while(pos < length) {
                for(i=0; i<numOfChan; i++) {
                    sample = Math.max(-1, Math.min(1, channels[i][offset]));
                    sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767)|0;
                    view.setInt16(pos, sample, true); pos += 2;
                }
                offset++
            }
            return new Blob([buffer], {type: "audio/wav"});

            function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
            function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }
        }

        // Inisialisasi awal
        drawRuler();
        setPlayhead(0);

    </script>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag diperbarui agar rapi di HP dan mencegah zoom layar bawaan browser -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kreaverse Ai - Music Making Studio</title>
    <!-- Font Awesome untuk Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --text-light: #ffffff;
            --accent-red: #ff3b30;
            --track-colors: #ff3b30, #34c759, #007aff, #ffcc00, #af52de;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Navbar Diperbarui agar Responsif */
        .navbar {
            display: flex;
            flex-direction: column; /* Bertumpuk di HP */
            align-items: center;
            padding: 10px;
            background-color: var(--bg-panel);
            border-bottom: 1px solid #333;
            gap: 10px;
        }

        @media (min-width: 768px) {
            .navbar {
                flex-direction: row; /* Berjejer di PC/Tablet */
                justify-content: space-between;
                height: 60px;
                padding: 10px 20px;
            }
        }

        .logo {
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: center;
        }

        .controls {
            display: flex;
            flex-wrap: wrap; /* Tombol pindah ke baris baru jika tidak muat */
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .controls {
                width: auto;
            }
        }

        button {
            cursor: pointer;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            color: white;
            transition: 0.2s;
            white-space: nowrap; /* Teks tombol tidak akan bertumpuk ke bawah */
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-primary { background-color: #333; }
        .btn-primary:hover { background-color: #555; }
        .btn-secondary { background-color: #555; }
        .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-export { background-color: var(--accent-red); }
        .btn-export:hover { background-color: #d32f2f; }
        .btn-icon { background-color: transparent; font-size: 1.2rem; padding: 5px 10px;}

        /* Workspace */
        .studio-container {
            flex-grow: 1; /* Otomatis mengisi sisa layar */
            display: flex;
            flex-direction: column;
            overflow-x: auto; 
            overflow-y: auto;
            position: relative;
        }

        .timeline-ruler {
            height: 30px;
            background-color: #222;
            border-bottom: 1px solid #444;
            position: sticky;
            top: 0;
            z-index: 10;
            width: 100%; 
        }

        .tracks-workspace {
            position: relative;
            padding-top: 10px;
            width: 100%; 
        }

        /* Track Row */
        .track-row {
            height: 90px;
            background-color: #1a1a1a;
            border-bottom: 1px solid #333;
            margin-bottom: 5px;
            position: relative;
            display: flex;
            align-items: center;
        }

        .track-info {
            width: 100px;
            height: 100%;
            background-color: #252525;
            position: sticky;
            left: 0;
            z-index: 5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 5px;
            box-sizing: border-box;
            border-right: 2px solid #000;
        }

        .track-info span {
            font-size: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Audio Clip */
        .clip {
            position: absolute;
            height: 70px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            user-select: none;
            border: 2px solid transparent;
            opacity: 0.9;
            overflow: hidden;
            touch-action: none; /* Penting: Mencegah layar scroll saat drag di HP */
        }

        .clip:active { cursor: grabbing; }
        .clip.selected { border-color: white; z-index: 4; box-shadow: 0 0 10px rgba(255,255,255,0.5); }

        /* Waveform mock */
        .waveform-mock {
            width: 100%;
            height: 50%;
            background: repeating-linear-gradient(
                90deg,
                rgba(255,255,255,0.2) 0px,
                rgba(255,255,255,0.6) 2px,
                transparent 2px,
                transparent 4px
            );
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <i class="fa-solid fa-music"></i> Kreaverse Ai Studio
        </div>
        <div class="controls">
            <input type="file" id="audio-upload" accept="audio/mp3, audio/wav" multiple style="display: none;">
            <button onclick="document.getElementById('audio-upload').click()" class="btn-primary">
                <i class="fa-solid fa-upload"></i> Upload
            </button>
            <button id="btn-cut" class="btn-secondary" disabled>
                <i class="fa-solid fa-scissors"></i> Potong
            </button>
            <button id="btn-zoom-out" class="btn-icon"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
            <button id="btn-zoom-in" class="btn-icon"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
            <button id="btn-export" class="btn-export">
                <i class="fa-solid fa-download"></i> Simpan
            </button>
        </div>
    </header>

    <main class="studio-container">
        <!-- Ruler / Timeline -->
        <div class="timeline-ruler" id="timeline-ruler"></div>
        
        <!-- Tracks Workspace -->
        <div class="tracks-workspace" id="tracks-workspace">
            <!-- Track ditambahkan di sini via JS -->
        </div>
    </main>

    <script>
        let trackCount = 0;
        const MAX_TRACKS = 10;
        let zoomLevel = 1;
        const WORKSPACE_BASE_WIDTH = 2000; 

        const trackColors = ['#ff3b30', '#34c759', '#007aff', '#ffcc00', '#af52de', '#ff9500', '#5ac8fa', '#ff2d55', '#5856d6', '#8e8e93'];

        let selectedClip = null;
        let isDragging = false;
        let offsetX = 0;

        const uploadInput = document.getElementById('audio-upload');
        const workspace = document.getElementById('tracks-workspace');
        const ruler = document.getElementById('timeline-ruler');
        const btnCut = document.getElementById('btn-cut');
        const btnZoomIn = document.getElementById('btn-zoom-in');
        const btnZoomOut = document.getElementById('btn-zoom-out');

        // 1. FITUR UPLOAD
        uploadInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                if (trackCount >= MAX_TRACKS) {
                    alert("Maksimal 10 lagu!");
                    return;
                }
                createTrack(file.name);
            });
            uploadInput.value = ''; 
        });

        function createTrack(fileName) {
            const trackColor = trackColors[trackCount % trackColors.length];
            
            const trackRow = document.createElement('div');
            trackRow.className = 'track-row';
            
            const trackInfo = document.createElement('div');
            trackInfo.className = 'track-info';
            trackInfo.innerHTML = `<span>Track ${trackCount + 1}</span><span style="color:gray; font-size:10px;">${fileName}</span>`;
            
            const clip = document.createElement('div');
            clip.className = 'clip';
            clip.style.backgroundColor = trackColor;
            clip.style.width = '250px'; 
            clip.style.left = '100px'; 
            
            const wave = document.createElement('div');
            wave.className = 'waveform-mock';
            clip.appendChild(wave);

            setupClipEvents(clip);

            trackRow.appendChild(trackInfo);
            trackRow.appendChild(clip);
            workspace.appendChild(trackRow);
            
            trackCount++;
            updateWorkspaceWidth();
        }

        // Fungsi bantuan untuk mendapatkan koordinat X baik dari Mouse maupun Jari (Touch)
        function getClientX(e) {
            return e.touches ? e.touches[0].clientX : e.clientX;
        }

        // 2. FITUR GESER (Mouse & Touch HP)
        function setupClipEvents(clip) {
            // Event Mulai Klik / Sentuh
            const dragStart = (e) => {
                if(selectedClip) selectedClip.classList.remove('selected');
                
                selectedClip = clip;
                clip.classList.add('selected');
                btnCut.disabled = false; 

                isDragging = true;
                offsetX = getClientX(e) - clip.getBoundingClientRect().left;
                clip.style.cursor = 'grabbing';
            };

            clip.addEventListener('mousedown', dragStart);
            clip.addEventListener('touchstart', dragStart, {passive: true});

            // Event Geser (Move)
            const dragMove = (e) => {
                if (!isDragging || !selectedClip) return;
                
                const workspaceRect = workspace.getBoundingClientRect();
                let newLeft = getClientX(e) - workspaceRect.left - offsetX;
                
                if (newLeft < 100) newLeft = 100; // Batas kiri tidak boleh nabrak judul track
                
                selectedClip.style.left = `${newLeft}px`;
            };

            document.addEventListener('mousemove', dragMove);
            document.addEventListener('touchmove', dragMove, {passive: true});

            // Event Lepas Klik / Sentuhan
            const dragEnd = () => {
                if(selectedClip) selectedClip.style.cursor = 'grab';
                isDragging = false;
            };

            document.addEventListener('mouseup', dragEnd);
            document.addEventListener('touchend', dragEnd);
        }

        // Klik luar layar untuk Unselect
        workspace.addEventListener('mousedown', (e) => {
            if (!e.target.closest('.clip')) unselectClip();
        });
        workspace.addEventListener('touchstart', (e) => {
            if (!e.target.closest('.clip')) unselectClip();
        }, {passive: true});

        function unselectClip() {
            if (selectedClip) selectedClip.classList.remove('selected');
            selectedClip = null;
            btnCut.disabled = true;
        }

        // 3. FITUR POTONG (CUT)
        btnCut.addEventListener('click', () => {
            if (!selectedClip) return;

            const currentWidth = parseFloat(selectedClip.style.width);
            const currentLeft = parseFloat(selectedClip.style.left);
            
            if(currentWidth < 30) {
                alert("Potongan terlalu kecil!");
                return;
            }

            const newWidth = currentWidth / 2;
            selectedClip.style.width = `${newWidth}px`;

            const newClip = selectedClip.cloneNode(true);
            newClip.style.width = `${newWidth}px`;
            newClip.style.left = `${currentLeft + newWidth + 5}px`; 
            
            newClip.classList.remove('selected');
            selectedClip.parentElement.appendChild(newClip);

            setupClipEvents(newClip);
        });

        // 4. FITUR ZOOM
        function updateWorkspaceWidth() {
            const newWidth = WORKSPACE_BASE_WIDTH * zoomLevel;
            workspace.style.width = `${newWidth}px`;
            ruler.style.width = `${newWidth}px`;
        }

        btnZoomIn.addEventListener('click', () => {
            zoomLevel += 0.2;
            updateWorkspaceWidth();
            document.querySelectorAll('.clip').forEach(clip => {
                clip.style.width = `${parseFloat(clip.style.width) * 1.2}px`;
                clip.style.left = `${(parseFloat(clip.style.left) - 100) * 1.2 + 100}px`;
            });
        });

        btnZoomOut.addEventListener('click', () => {
            if (zoomLevel <= 0.4) return;
            zoomLevel -= 0.2;
            updateWorkspaceWidth();
            document.querySelectorAll('.clip').forEach(clip => {
                clip.style.width = `${parseFloat(clip.style.width) / 1.2}px`;
                clip.style.left = `${(parseFloat(clip.style.left) - 100) / 1.2 + 100}px`;
            });
        });

        // 5. EXPORT
        document.getElementById('btn-export').addEventListener('click', () => {
            alert("UI siap digunakan di Mobile/PC!\n\n(Untuk menyimpan format MP3 asli butuh integrasi backend/ffmpeg)");
        });
    </script>
</body>
</html>

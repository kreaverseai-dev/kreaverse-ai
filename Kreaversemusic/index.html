<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kreaverse Ai Studio Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* TEMA & VARIABEL */
        :root {
            --bg-main: #111111;
            --bg-panel: #1e1e24;
            --bg-toolbar: #2b2b36;
            --text-main: #f0f0f0;
            --text-muted: #888;
            --accent: #ff3b30;
            --accent-hover: #ff5c53;
            --track-bg: #18181d;
            --border: #333;
            --playhead: #ffcc00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none; /* Mencegah blok teks biru saat drag */
        }

        /* CUSTOM MODAL (Pengganti Alert Bawaan) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); z-index: 9999;
            display: none; justify-content: center; align-items: center;
        }
        .modal-box {
            background: var(--bg-toolbar); padding: 20px; border-radius: 10px;
            width: 300px; text-align: center; border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .modal-box h3 { margin-bottom: 10px; }
        .modal-box p { margin-bottom: 20px; color: var(--text-muted); font-size: 0.9rem; }
        .modal-btn {
            background: var(--accent); color: white; border: none;
            padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        .progress-bar-container {
            width: 100%; background: var(--bg-main); height: 10px; border-radius: 5px;
            overflow: hidden; margin-bottom: 15px; display: none;
        }
        .progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.2s; }

        /* TOP NAVIGATION */
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-panel); height: 60px; padding: 0 20px;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        
        /* PLAY CONTROLS */
        .play-controls { display: flex; gap: 15px; }
        .play-btn {
            background: transparent; color: white; border: none;
            font-size: 1.5rem; cursor: pointer; transition: 0.2s;
        }
        .play-btn:hover { color: var(--accent); }
        .play-btn.active { color: var(--accent); }

        .export-btn {
            background: var(--accent); color: white; border: none;
            padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer;
        }

        /* TOOLBAR (Menu Tindakan) */
        .toolbar {
            display: flex; gap: 10px; padding: 10px 20px; background: var(--bg-toolbar);
            border-bottom: 1px solid var(--border); overflow-x: auto;
        }
        .tool-btn {
            background: var(--bg-panel); color: white; border: 1px solid var(--border);
            padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.85rem;
            display: flex; align-items: center; gap: 5px; white-space: nowrap;
        }
        .tool-btn:hover { background: #3a3a48; }
        .tool-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* WORKSPACE & TIMELINE */
        .workspace {
            flex-grow: 1; display: flex; flex-direction: column;
            overflow-x: auto; overflow-y: auto; position: relative;
        }
        
        .ruler-container {
            height: 30px; background: var(--bg-toolbar); position: sticky;
            top: 0; z-index: 50; border-bottom: 1px solid var(--border);
        }
        .ruler-canvas { position: absolute; left: 100px; height: 100%; }
        
        .tracks-container { position: relative; width: 100%; min-height: 100%; }

        /* PLAYHEAD (Garis Penanda Potong/Play) */
        .playhead-wrapper {
            position: absolute; top: 0; bottom: 0; left: 100px; width: 0; z-index: 100;
        }
        .playhead-line {
            position: absolute; left: 0; top: 30px; bottom: 0;
            width: 2px; background: var(--playhead); box-shadow: 0 0 5px var(--playhead);
            pointer-events: none;
        }
        .playhead-handle {
            position: absolute; left: -7px; top: 0; width: 16px; height: 30px;
            background: var(--playhead); clip-path: polygon(0 0, 100% 0, 100% 60%, 50% 100%, 0 60%);
            cursor: ew-resize; touch-action: none;
        }

        /* TRACK & CLIP */
        .track {
            height: 90px; background: var(--track-bg); border-bottom: 1px solid var(--border);
            display: flex; position: relative;
        }
        .track-header {
            width: 100px; background: var(--bg-panel); position: sticky; left: 0; z-index: 40;
            border-right: 2px solid var(--border); padding: 5px; display: flex;
            flex-direction: column; justify-content: center; text-align: center;
        }
        .track-header span { font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        
        .clip {
            position: absolute; height: 70px; top: 10px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            cursor: grab; border: 2px solid rgba(255,255,255,0.1); touch-action: none;
            overflow: hidden; color: white; font-size: 0.7rem; font-weight: bold;
        }
        .clip.selected { border-color: white; z-index: 10; box-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .clip.locked { border: 2px dashed #ff3b30; cursor: not-allowed; opacity: 0.8;}
        
        .clip-wave {
            position: absolute; width: 100%; height: 50%; opacity: 0.3; pointer-events: none;
            background: repeating-linear-gradient(90deg, #fff 0px, #fff 2px, transparent 2px, transparent 4px);
        }
        
        .clip .lock-icon { position: absolute; top: 5px; right: 5px; font-size: 10px; display: none; }
        .clip.locked .lock-icon { display: block; }
    </style>
</head>
<body>

    <!-- CUSTOM MODAL -->
    <div class="modal-overlay" id="custom-modal">
        <div class="modal-box">
            <h3 id="modal-title">Pemberitahuan</h3>
            <p id="modal-desc">Pesan di sini</p>
            <div class="progress-bar-container" id="modal-progress-container">
                <div class="progress-bar" id="modal-progress"></div>
            </div>
            <button class="modal-btn" id="modal-ok-btn" onclick="closeModal()">OK</button>
        </div>
    </div>

    <!-- TOP NAV -->
    <header class="top-nav">
        <div class="logo"><i class="fa-solid fa-headphones-simple"></i> Kreaverse Ai</div>
        
        <div class="play-controls">
            <button class="play-btn" id="btn-stop"><i class="fa-solid fa-stop"></i></button>
            <button class="play-btn" id="btn-play"><i class="fa-solid fa-play"></i></button>
        </div>

        <button class="export-btn" onclick="startExport()"><i class="fa-solid fa-download"></i> Simpan MP3</button>
    </header>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <!-- Input file accept="audio/*" memperbaiki masalah audio abu-abu di HP -->
        <input type="file" id="audio-upload" accept="audio/*" multiple style="display: none;">
        
        <button class="tool-btn" onclick="document.getElementById('audio-upload').click()">
            <i class="fa-solid fa-plus"></i> Tambah Lagu
        </button>
        
        <div style="width: 1px; background: var(--border); margin: 0 5px;"></div>
        
        <button class="tool-btn" id="btn-cut" disabled><i class="fa-solid fa-scissors"></i> Potong</button>
        <button class="tool-btn" id="btn-copy" disabled><i class="fa-solid fa-copy"></i> Duplikat</button>
        <button class="tool-btn" id="btn-delete" disabled><i class="fa-solid fa-trash"></i> Hapus</button>
        <button class="tool-btn" id="btn-lock" disabled><i class="fa-solid fa-lock"></i> Kunci</button>
        
        <div style="width: 1px; background: var(--border); margin: 0 5px;"></div>
        
        <button class="tool-btn" id="btn-zoom-out"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
        <button class="tool-btn" id="btn-zoom-in"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
    </div>

    <!-- WORKSPACE -->
    <main class="workspace" id="workspace">
        <div class="ruler-container" id="ruler-container">
            <canvas class="ruler-canvas" id="ruler"></canvas>
            
            <!-- PLAYHEAD / GARIS PENANDA POTONG -->
            <div class="playhead-wrapper" id="playhead">
                <div class="playhead-handle" id="playhead-handle"></div>
                <div class="playhead-line"></div>
            </div>
        </div>
        
        <div class="tracks-container" id="tracks-workspace">
            <!-- Tracks masuk sini -->
        </div>
    </main>

    <script>
        // --- KONFIGURASI & VARIABEL ---
        let PPS = 20; // Pixels Per Second (Berapa pixel untuk 1 detik)
        let zoom = 1;
        const TRACK_HEADER_WIDTH = 100;
        const MIN_CUT_SECONDS = 1; // Minimal potong 1 detik

        let trackCount = 0;
        let selectedClip = null;
        let playheadPos = 0; // dalam pixel relatif terhadap track area (tanpa header)
        
        // State Playback
        let isPlaying = false;
        let playInterval;

        const colors = ['#007aff', '#34c759', '#ff9500', '#af52de', '#ff2d55'];
        const ws = document.getElementById('workspace');
        const tracksWs = document.getElementById('tracks-workspace');
        const rulerCanvas = document.getElementById('ruler');
        const playhead = document.getElementById('playhead');

        // --- SISTEM MODAL (Pengganti Alert) ---
        function showModal(title, desc, isProgress = false) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            
            const progCont = document.getElementById('modal-progress-container');
            const okBtn = document.getElementById('modal-ok-btn');
            
            if (isProgress) {
                progCont.style.display = 'block';
                okBtn.style.display = 'none';
                document.getElementById('modal-progress').style.width = '0%';
            } else {
                progCont.style.display = 'none';
                okBtn.style.display = 'inline-block';
            }
            
            document.getElementById('custom-modal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('custom-modal').style.display = 'none'; }

        // --- PENGGARIS WAKTU (RULER) ---
        function drawRuler() {
            const ctx = rulerCanvas.getContext('2d');
            const width = Math.max(ws.scrollWidth, 3000); // Lebar minimal
            rulerCanvas.width = width;
            rulerCanvas.height = 30;
            
            ctx.clearRect(0, 0, width, 30);
            ctx.fillStyle = "#888";
            ctx.font = "10px sans-serif";
            
            const scaledPPS = PPS * zoom;
            
            for (let i = 0; i * scaledPPS < width; i++) {
                const x = i * scaledPPS;
                if (i % 5 === 0) {
                    // Garis panjang setiap 5 detik
                    ctx.fillRect(x, 15, 1, 15);
                    // Format waktu MM:SS
                    const min = Math.floor(i / 60);
                    const sec = i % 60;
                    ctx.fillText(`${min}:${sec < 10 ? '0'+sec : sec}`, x + 3, 12);
                } else {
                    // Garis pendek setiap 1 detik
                    ctx.fillRect(x, 22, 1, 8);
                }
            }
            tracksWs.style.width = `${width + TRACK_HEADER_WIDTH}px`;
        }
        window.addEventListener('resize', drawRuler);
        
        // --- PLAYHEAD (GARIS PENANDA) LOGIC ---
        let isDraggingPlayhead = false;
        
        function updatePlayheadUI() {
            playhead.style.left = `${TRACK_HEADER_WIDTH + playheadPos}px`;
        }

        function setPlayhead(xCoordinate) {
            let newPos = xCoordinate - TRACK_HEADER_WIDTH;
            if (newPos < 0) newPos = 0;
            playheadPos = newPos;
            updatePlayheadUI();
        }

        const handle = document.getElementById('playhead-handle');
        
        const phStart = (e) => { isDraggingPlayhead = true; }
        const phMove = (e) => {
            if (!isDraggingPlayhead) return;
            const rect = ws.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            // Memperhitungkan scroll horizontal
            const absoluteX = clientX - rect.left + ws.scrollLeft;
            setPlayhead(absoluteX);
        }
        const phEnd = () => { isDraggingPlayhead = false; }

        handle.addEventListener('mousedown', phStart);
        handle.addEventListener('touchstart', phStart, {passive: true});
        document.addEventListener('mousemove', phMove);
        document.addEventListener('touchmove', phMove, {passive: true});
        document.addEventListener('mouseup', phEnd);
        document.addEventListener('touchend', phEnd);

        // --- PLAY & STOP LOGIC (Simulasi) ---
        const btnPlay = document.getElementById('btn-play');
        btnPlay.addEventListener('click', () => {
            if (isPlaying) {
                // Pause
                isPlaying = false;
                clearInterval(playInterval);
                btnPlay.innerHTML = '<i class="fa-solid fa-play"></i>';
                btnPlay.classList.remove('active');
            } else {
                // Play
                isPlaying = true;
                btnPlay.innerHTML = '<i class="fa-solid fa-pause"></i>';
                btnPlay.classList.add('active');
                
                playInterval = setInterval(() => {
                    playheadPos += (PPS * zoom) / 20; // Maju sesuai scale (Asumsi 20fps setInterval)
                    updatePlayheadUI();
                    
                    // Auto scroll jika playhead keluar layar kanan
                    const phScreenX = playhead.getBoundingClientRect().left;
                    if (phScreenX > window.innerWidth - 50) {
                        ws.scrollLeft += 100;
                    }
                }, 50);
            }
        });

        document.getElementById('btn-stop').addEventListener('click', () => {
            isPlaying = false;
            clearInterval(playInterval);
            btnPlay.innerHTML = '<i class="fa-solid fa-play"></i>';
            btnPlay.classList.remove('active');
            playheadPos = 0; // Kembali ke awal
            updatePlayheadUI();
            ws.scrollLeft = 0;
        });

        // --- UPLOAD & BUAT TRACK ---
        document.getElementById('audio-upload').addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            
            files.forEach(file => {
                // Coba baca durasi asli file menggunakan dummy audio element
                const url = URL.createObjectURL(file);
                const audio = new Audio(url);
                
                audio.addEventListener('loadedmetadata', () => {
                    createTrack(file.name, audio.duration);
                });
                
                // Fallback jika browser gagal baca metadata (misal format aneh), set default 60 detik
                audio.addEventListener('error', () => {
                    createTrack(file.name, 60); 
                });
            });
            e.target.value = ''; 
        });

        function createTrack(name, durationSec) {
            const color = colors[trackCount % colors.length];
            const track = document.createElement('div');
            track.className = 'track';
            
            track.innerHTML = `
                <div class="track-header">
                    <span>Trk ${trackCount+1}</span>
                    <span style="color:#888; font-size:9px">${name}</span>
                </div>
            `;
            
            // Lebar clip berdasarkan durasi
            const clipWidth = durationSec * PPS * zoom;
            
            const clip = createClipElement(color, name, clipWidth, 0); // Left awal 0
            
            track.appendChild(clip);
            tracksWs.appendChild(track);
            trackCount++;
            drawRuler(); // Redraw agar timeline memanjang jika lagunya panjang
        }

        function createClipElement(color, text, width, left) {
            const clip = document.createElement('div');
            clip.className = 'clip';
            clip.style.background = color;
            clip.style.width = `${width}px`;
            clip.style.left = `${left + TRACK_HEADER_WIDTH}px`; // Relatif ke header
            clip.dataset.color = color;
            clip.dataset.locked = "false";
            
            clip.innerHTML = `
                <i class="fa-solid fa-lock lock-icon"></i>
                <div class="clip-wave"></div>
                <span>${text}</span>
            `;
            
            setupClipEvents(clip);
            return clip;
        }

        // --- CLIP EVENTS (Drag, Select, Lock) ---
        let dragOffsetX = 0;
        let draggedClip = null;

        function setupClipEvents(clip) {
            const startDrag = (e) => {
                selectClip(clip);
                if (clip.dataset.locked === "true") return; // Jangan geser jika dilock
                
                draggedClip = clip;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                dragOffsetX = clientX - clip.getBoundingClientRect().left;
            };

            clip.addEventListener('mousedown', startDrag);
            clip.addEventListener('touchstart', startDrag, {passive: true});
        }

        const moveDrag = (e) => {
            if (!draggedClip) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const rect = ws.getBoundingClientRect();
            
            // Hitung posisi dengan scroll
            let newLeft = clientX - rect.left + ws.scrollLeft - dragOffsetX;
            
            // Jangan sampai nabrak header
            if (newLeft < TRACK_HEADER_WIDTH) newLeft = TRACK_HEADER_WIDTH;
            
            draggedClip.style.left = `${newLeft}px`;
        }

        const endDrag = () => { draggedClip = null; }

        document.addEventListener('mousemove', moveDrag);
        document.addEventListener('touchmove', moveDrag, {passive: true});
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);

        // --- SELECT CLIP LOGIC ---
        function selectClip(clip) {
            if (selectedClip) selectedClip.classList.remove('selected');
            selectedClip = clip;
            clip.classList.add('selected');
            
            // Update UI Toolbar
            document.getElementById('btn-cut').disabled = false;
            document.getElementById('btn-copy').disabled = false;
            document.getElementById('btn-delete').disabled = false;
            document.getElementById('btn-lock').disabled = false;
            
            // Ganti teks tombol lock sesuai status
            const btnLock = document.getElementById('btn-lock');
            if (clip.dataset.locked === "true") {
                btnLock.innerHTML = '<i class="fa-solid fa-unlock"></i> Buka Kunci';
            } else {
                btnLock.innerHTML = '<i class="fa-solid fa-lock"></i> Kunci';
            }
        }

        // Unselect saat klik background kosong
        ws.addEventListener('mousedown', (e) => {
            if (!e.target.closest('.clip') && !e.target.closest('.playhead-handle')) {
                if (selectedClip) selectedClip.classList.remove('selected');
                selectedClip = null;
                document.querySelectorAll('.tool-btn:not(#btn-zoom-in):not(#btn-zoom-out)').forEach(b => b.disabled = true);
            }
        });

        // --- TOOLBAR ACTIONS ---
        
        // 1. DELETE
        document.getElementById('btn-delete').addEventListener('click', () => {
            if (selectedClip) {
                // Konfirmasi custom
                showModal("Hapus Audio", "Apakah Anda yakin ingin menghapus potongan ini?");
                // Mengubah fungsi tombol OK sementara untuk delete
                const okBtn = document.getElementById('modal-ok-btn');
                okBtn.onclick = function() {
                    selectedClip.remove();
                    selectedClip = null;
                    document.querySelectorAll('.tool-btn:not(#btn-zoom-in):not(#btn-zoom-out)').forEach(b => b.disabled = true);
                    closeModal();
                    // Kembalikan fungsi OK
                    okBtn.onclick = closeModal;
                };
            }
        });

        // 2. DUPLIKAT
        document.getElementById('btn-copy').addEventListener('click', () => {
            if (selectedClip) {
                const currentWidth = parseFloat(selectedClip.style.width);
                const currentLeft = parseFloat(selectedClip.style.left);
                
                // Buat kloningan diletakkan tepat di sebelah kanannya
                const newClip = createClipElement(
                    selectedClip.dataset.color, 
                    "Copy", 
                    currentWidth, 
                    currentLeft + currentWidth - TRACK_HEADER_WIDTH
                );
                
                selectedClip.parentElement.appendChild(newClip);
            }
        });

        // 3. LOCK (KUNCI GESER)
        document.getElementById('btn-lock').addEventListener('click', () => {
            if (selectedClip) {
                const isLocked = selectedClip.dataset.locked === "true";
                selectedClip.dataset.locked = !isLocked ? "true" : "false";
                
                if (!isLocked) {
                    selectedClip.classList.add('locked');
                    document.getElementById('btn-lock').innerHTML = '<i class="fa-solid fa-unlock"></i> Buka Kunci';
                } else {
                    selectedClip.classList.remove('locked');
                    document.getElementById('btn-lock').innerHTML = '<i class="fa-solid fa-lock"></i> Kunci';
                }
            }
        });

        // 4. POTONG (CUT) BERDASARKAN PLAYHEAD TEPAT
        document.getElementById('btn-cut').addEventListener('click', () => {
            if (!selectedClip) return;
            if (selectedClip.dataset.locked === "true") {
                showModal("Gagal", "Audio ini dikunci. Buka kunci terlebih dahulu untuk memotong.");
                return;
            }

            const clipLeft = parseFloat(selectedClip.style.left);
            const clipWidth = parseFloat(selectedClip.style.width);
            const clipRight = clipLeft + clipWidth;
            const phAbsolute = playheadPos + TRACK_HEADER_WIDTH;

            // Cek apakah garis putar (playhead) berada DI DALAM clip yang dipilih
            if (phAbsolute > clipLeft && phAbsolute < clipRight) {
                
                const widthPart1 = phAbsolute - clipLeft;
                const widthPart2 = clipRight - phAbsolute;
                
                // Aturan 1 Detik Minimal (Misal zoom 1, 1 detik = 20px)
                const minPx = MIN_CUT_SECONDS * PPS * zoom;
                
                if (widthPart1 < minPx || widthPart2 < minPx) {
                    showModal("Terlalu Kecil", `Potongan tidak boleh kurang dari ${MIN_CUT_SECONDS} detik.`);
                    return;
                }

                // Potong! Ubah ukuran clip pertama
                selectedClip.style.width = `${widthPart1}px`;
                selectedClip.querySelector('span').innerText = "Part 1";

                // Buat clip kedua (sisanya)
                const newClip = createClipElement(
                    selectedClip.dataset.color,
                    "Part 2",
                    widthPart2,
                    phAbsolute - TRACK_HEADER_WIDTH + 2 // +2 px jarak celah visual
                );
                
                selectedClip.parentElement.appendChild(newClip);
                showModal("Sukses", "Audio berhasil dipotong tepat di garis penanda.");
            } else {
                showModal("Gagal Potong", "Geser garis kuning (Playhead) tepat ke atas audio yang dipilih untuk memotongnya.");
            }
        });

        // 5. ZOOM
        function applyZoom() {
            drawRuler();
            updatePlayheadUI();
            
            // Skalakan ulang semua clip
            document.querySelectorAll('.clip').forEach(clip => {
                // Perlu menyimpan durasi asli/start asli di dataset untuk zoom presisi di produksi nyata.
                // Untuk UI template ini, kita kali silang dari lebar saat ini
                const oldWidth = parseFloat(clip.style.width);
                const oldLeft = parseFloat(clip.style.left) - TRACK_HEADER_WIDTH;
                // Faktor pengali (misal dari zoom 1 ke 1.2 -> faktor 1.2)
                // Ini pendekatan sederhana.
            });
            // (Catatan: Zoom logic pada DOM dinamis butuh re-kalkulasi dari State aslinya. 
            // Untuk template ini kita lewati visual scaling clip agar tidak error posisi saat dipotong,
            // Namun ruler timeline sudah menyesuaikan zoom).
        }

        // --- PROGRESS SIMPAN MP3 ---
        function startExport() {
            if (trackCount === 0) {
                showModal("Kosong", "Tidak ada lagu yang ditambahkan!");
                return;
            }
            
            showModal("Menyimpan MP3...", "Harap tunggu, sedang merender audio (Simulasi)", true);
            const progBar = document.getElementById('modal-progress');
            let progress = 0;
            
            const renderInterval = setInterval(() => {
                progress += Math.random() * 15; // Naik acak
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(renderInterval);
                    setTimeout(() => {
                        showModal("Berhasil!", "File MP3 Anda siap. (UI Preview Selesai)");
                    }, 500);
                }
                progBar.style.width = `${progress}%`;
            }, 300);
        }

        // INIT
        drawRuler();
        updatePlayheadUI();

    </script>
</body>
</html>

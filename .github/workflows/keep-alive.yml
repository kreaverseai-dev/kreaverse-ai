name: Keep Hugging Face Awake

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  ping-spaces:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Keep Alive Endpoint
        run: |
          curl -s -X GET "https://${{ secrets.VERCEL_DOMAIN }}/api/keep-alive" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
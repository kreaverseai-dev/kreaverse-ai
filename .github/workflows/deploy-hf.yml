name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        run: |
          git push --force https://kreaverse-ai:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/kreaverse-ai/ytdl-downloader HEAD:main
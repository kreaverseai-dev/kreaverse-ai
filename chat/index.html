<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kreaverse AI - Advanced Chat</title>
    <meta name="theme-color" content="#ffffff">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Library Markdown & Code Highlight -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

    <style>
        /* =========================================================
           KREAVERSE CHAT UI - PRO/CHATGPT/CLAUDE STYLE
           ========================================================= */
        :root {
            --bg-color: #FFFFFF;
            --surface-color: #F9F9F9; 
            --sidebar-bg: #F0F0F0;
            --text-primary: #0D0D0D;
            --text-secondary: #555555;
            --border-color: #E5E5E5;
            --accent-blue: #10A37F; /* ChatGPT Greenish/Teal */
            --code-bg: #1E1E1E;
            --transition-smooth: all 0.2s ease;
            --font-main: 'Inter', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        body.dark-theme {
            --bg-color: #212121;
            --surface-color: #2F2F2F;
            --sidebar-bg: #171717;
            --text-primary: #ECECEC;
            --text-secondary: #9B9B9B;
            --border-color: #383838;
            --accent-blue: #10A37F;
            --code-bg: #0D0D0D;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font-main); background-color: var(--bg-color); color: var(--text-primary); height: 100dvh; display: flex; overflow: hidden; }
        button { font-family: var(--font-main); }

        /* --- SIDEBAR --- */
        .chat-sidebar { width: 280px; background-color: var(--sidebar-bg); display: flex; flex-direction: column; transition: var(--transition-smooth); z-index: 100; border-right: 1px solid var(--border-color); }
        .sidebar-header-top { display: flex; align-items: center; padding: 15px; }
        .hamburger-btn { background: none; border: none; font-size: 1.2rem; color: var(--text-secondary); cursor: pointer; width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .hamburger-btn:hover { background-color: var(--surface-color); color: var(--text-primary); }

        .new-chat-btn-gemini { display: flex; align-items: center; justify-content: center; gap: 10px; background-color: var(--bg-color); border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; color: var(--text-primary); font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: var(--transition-smooth); margin: 0 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .new-chat-btn-gemini:hover { background-color: var(--surface-color); }
        
        /* History & Nav */
        .history-section { flex: 1; overflow-y: auto; padding: 10px; margin-top: 10px; display:flex; flex-direction:column; }
        .history-section::-webkit-scrollbar { width: 4px; }
        .history-section::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 4px; }
        
        .history-item-gemini { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 8px; color: var(--text-primary); text-decoration: none; font-size: 0.85rem; cursor: pointer; transition: var(--transition-smooth); margin-bottom: 2px; }
        .history-item-gemini:hover { background-color: var(--surface-color); }
        .history-item-gemini.active { background-color: var(--surface-color); font-weight: 600; }
        .history-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 10px; }
        .history-actions { display: none; gap: 8px; }
        .history-item-gemini:hover .history-actions { display: flex; }
        .hist-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 0.9rem; }
        .hist-btn:hover { color: var(--text-primary); }

        .sidebar-footer { padding: 15px; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 8px; }
        .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; color: var(--text-primary); text-decoration: none; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: var(--transition-smooth); }
        .sidebar-item:hover { background-color: var(--surface-color); }

        /* --- MAIN CHAT AREA --- */
        .chat-main { flex: 1; display: flex; flex-direction: column; position: relative; background: var(--bg-color); }
        
        .top-navbar-main { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--bg-color); border-bottom: 1px solid var(--border-color); z-index: 10; }
        .top-model-selector { display: flex; align-items: center; gap: 8px; font-size: 1rem; font-weight: 600; color: var(--text-primary); cursor: pointer; padding: 8px 12px; border-radius: 8px; transition: 0.2s; }
        .top-model-selector:hover { background-color: var(--surface-color); }

        .messages-container { flex: 1; overflow-y: auto; padding: 0 0 160px 0; scroll-behavior: smooth; display: flex; flex-direction: column; align-items: center; }
        
        /* Message Rows - Flat Pro Style */
        .message-row { width: 100%; display: flex; justify-content: center; padding: 25px 20px; border-bottom: 1px solid transparent; }
        .message-row.ai-role { background-color: var(--surface-color); border-bottom: 1px solid var(--border-color); border-top: 1px solid var(--border-color); }
        
        .message-content-wrapper { width: 100%; max-width: 850px; display: flex; gap: 20px; }
        
        .avatar-box { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; color: #FFF; }
        .avatar-user { background: #555; }
        .avatar-ai { background: var(--accent-blue); }

        .message-body { flex: 1; min-width: 0; /* Prevents overflow */ }
        .user-text-content { font-size: 1rem; line-height: 1.6; white-space: pre-wrap; color: var(--text-primary); }

        /* --- MARKDOWN & CODE BLOCKS --- */
        .markdown-body { font-size: 1rem; line-height: 1.7; color: var(--text-primary); width: 100%; }
        .markdown-body p { margin-bottom: 16px; }
        .markdown-body p:last-child { margin-bottom: 0; }
        
        /* Canggih Code Block Wrapper */
        .code-block-wrapper { background-color: var(--code-bg); border-radius: 8px; margin: 16px 0; overflow: hidden; border: 1px solid #444; }
        .code-block-header { display: flex; justify-content: space-between; align-items: center; background-color: #2D2D2D; padding: 8px 16px; border-bottom: 1px solid #444; }
        .code-lang-label { color: #A3A3A3; font-size: 0.75rem; font-family: var(--font-code); font-weight: 600; text-transform: uppercase; }
        .code-actions-group { display: flex; gap: 12px; }
        .code-action-btn { background: none; border: none; color: #A3A3A3; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: color 0.2s; font-family: var(--font-main); }
        .code-action-btn:hover { color: #FFF; }
        .code-block-content { overflow-x: auto; padding: 16px; background-color: var(--code-bg); transition: max-height 0.3s ease-out; }
        .code-block-content pre { margin: 0 !important; padding: 0 !important; background: transparent !important; border: none !important; }
        .code-block-content code { font-family: var(--font-code); font-size: 0.9rem; line-height: 1.5; text-shadow: none; }
        
        .markdown-body strong { font-weight: 600; color: var(--text-primary); }
        .markdown-body ul, .markdown-body ol { margin-left: 24px; margin-bottom: 16px; }
        .markdown-body li { margin-bottom: 8px; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
        .markdown-body th, .markdown-body td { border: 1px solid var(--border-color); padding: 8px 12px; text-align: left; }

        /* Action Buttons Below AI Message */
        .ai-actions-row { display: flex; gap: 8px; margin-top: 15px; opacity: 0.7; transition: 0.2s; }
        .message-row:hover .ai-actions-row { opacity: 1; }
        .action-icon-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 6px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; transition: background 0.2s; }
        .action-icon-btn:hover { background-color: rgba(0,0,0,0.05); color: var(--text-primary); }
        body.dark-theme .action-icon-btn:hover { background-color: rgba(255,255,255,0.1); }

        /* --- INPUT AREA (BAWAH) --- */
        .input-area-wrapper { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(180deg, rgba(255,255,255,0) 0%, var(--bg-color) 30%); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        body.dark-theme .input-area-wrapper { background: linear-gradient(180deg, rgba(33,33,33,0) 0%, var(--bg-color) 30%); }
        
        .gemini-input-box { width: 100%; max-width: 850px; background-color: var(--bg-color); border: 1px solid var(--border-color); border-radius: 16px; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        body.dark-theme .gemini-input-box { box-shadow: 0 4px 20px rgba(0,0,0,0.2); background-color: var(--surface-color); }
        
        .attachment-preview-container { display: none; align-items: center; gap: 10px; padding: 8px 12px; background: var(--surface-color); border-radius: 8px; width: fit-content; border: 1px solid var(--border-color); }
        .attachment-preview-container.active { display: flex; }
        .attachment-preview-container img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; }

        .input-row-bottom { display: flex; align-items: flex-end; gap: 10px; width: 100%; }
        .gemini-input-btn { background: none; border: none; color: var(--text-secondary); font-size: 1.2rem; cursor: pointer; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; transition: 0.2s; }
        .gemini-input-btn:hover { background-color: var(--surface-color); color: var(--text-primary); }

        #chat-input-textarea { flex: 1; border: none; outline: none; background: transparent; font-size: 1rem; color: var(--text-primary); font-family: var(--font-main); resize: none; max-height: 200px; line-height: 1.5; padding: 8px 0; }
        #chat-input-textarea::placeholder { color: var(--text-secondary); }

        .send-btn-gemini { background: var(--accent-blue); color: #FFF; border: none; width: 36px; height: 36px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: 0.2s; opacity: 0.5; margin-bottom: 2px; }
        .send-btn-gemini.active { opacity: 1; box-shadow: 0 2px 6px rgba(16, 163, 127, 0.4); }
        
        .disclaimer-text { font-size: 0.75rem; color: var(--text-secondary); margin-top: 12px; text-align: center; }

        /* MODALS & OVERLAYS */
        @media (max-width: 768px) {
            .chat-sidebar { position: fixed; top: 0; bottom: 0; left: -300px; z-index: 1000; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
            .chat-sidebar.open { left: 0; }
        }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
        .sidebar-overlay.active { display: block; }

        /* Model Selector */
        .model-selector-modal { position: absolute; top: calc(100% + 5px); left: 0; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 280px; display: none; flex-direction: column; z-index: 1001; padding: 8px; }
        .model-selector-modal.open { display: flex; }
        .model-opt { padding: 12px 16px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; font-weight: 500; transition: background 0.2s; color: var(--text-primary); }
        .model-opt:hover { background: var(--bg-color); }
        .model-opt.selected { background: rgba(16, 163, 127, 0.1); color: var(--accent-blue); }

    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- SIDEBAR -->
    <aside class="chat-sidebar" id="sidebar">
        <div class="sidebar-header-top">
            <button class="hamburger-btn" id="close-sidebar-btn"><i class="fa-solid fa-bars"></i></button>
            <span style="font-weight: 700; font-size: 1.2rem; margin-left: 10px; letter-spacing: -0.5px;">Kreaverse <span style="color:var(--accent-blue);">AI</span></span>
        </div>

        <button class="new-chat-btn-gemini" onclick="window.startNewChat()">
            <i class="fa-regular fa-pen-to-square"></i> Chat Baru
        </button>

        <div class="history-section">
            <div style="position:relative; margin-bottom: 10px;">
                <i class="fa-solid fa-magnifying-glass" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-secondary); font-size:0.85rem;"></i>
                <input type="text" id="history-search-input" placeholder="Cari percakapan..." onkeyup="window.filterHistory()" style="width:100%; background:var(--bg-color); border:1px solid var(--border-color); padding:8px 10px 8px 32px; border-radius:8px; outline:none; color:var(--text-primary); font-family:var(--font-main); font-size:0.85rem;">
            </div>
            <div id="history-list-container"></div>
        </div>

        <div class="sidebar-footer">
            <a href="/berkas/" class="sidebar-item"><i class="fa-regular fa-folder-open"></i> Berkas Pengguna</a>
            <div class="sidebar-item" onclick="window.openSettingsModal()"><i class="fa-solid fa-gear"></i> Setelan Provider</div>
        </div>
    </aside>

    <!-- SETTINGS MODAL -->
    <div id="gemini-settings-modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:9999; display:none; align-items:center; justify-content:center; backdrop-filter:blur(2px);">
        <div style="background:var(--bg-color); width:90%; max-width:400px; border-radius:16px; padding:24px; box-shadow:0 10px 40px rgba(0,0,0,0.3); border:1px solid var(--border-color);">
            <h3 style="margin-bottom:20px; font-weight:600; font-size:1.2rem;">Setelan Kreaverse</h3>
            <div style="display:flex; flex-direction:column; gap:15px;">
                <div>
                    <label style="font-size:0.85rem; color:var(--text-secondary); margin-bottom:5px; display:block;">Nama Tampilan</label>
                    <input type="text" id="setting-nama" style="width:100%; padding:10px 14px; border-radius:8px; border:1px solid var(--border-color); background:var(--surface-color); color:var(--text-primary); outline:none; font-family:var(--font-main);">
                </div>
                <div>
                    <label style="font-size:0.85rem; color:var(--text-secondary); margin-bottom:5px; display:block;">Tema Tampilan</label>
                    <select id="setting-tema" style="width:100%; padding:10px 14px; border-radius:8px; border:1px solid var(--border-color); background:var(--surface-color); color:var(--text-primary); outline:none; font-family:var(--font-main); cursor:pointer;">
                        <option value="dark">Gelap (Pro Mode)</option>
                        <option value="light">Terang</option>
                    </select>
                </div>
            </div>
            <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:25px;">
                <button onclick="window.closeSettingsModal()" style="background:transparent; border:none; color:var(--text-secondary); padding:8px 16px; cursor:pointer; font-weight:500;">Batal</button>
                <button onclick="window.saveSettingsModal()" style="background:var(--accent-blue); border:none; color:#FFF; padding:8px 16px; border-radius:8px; cursor:pointer; font-weight:500;">Simpan</button>
            </div>
        </div>
    </div>

    <!-- MAIN CHAT AREA -->
    <main class="chat-main">
        <header class="top-navbar-main">
            <div style="display:flex; align-items:center; gap:10px;">
                <button class="hamburger-btn" id="open-sidebar-btn"><i class="fa-solid fa-bars"></i></button>
                
                <div style="position: relative;">
                    <div class="top-model-selector" id="top-model-trigger" onclick="window.toggleModelDropdown()">
                        <span id="header-model-name">Tencent HY3 (Pro)</span>
                        <i class="fa-solid fa-chevron-down" style="font-size: 0.75rem; color:var(--text-secondary);"></i>
                    </div>
                    <div class="model-selector-modal" id="model-selector-modal">
                        <div style="padding: 8px 12px; font-size: 0.75rem; color: var(--text-secondary); font-weight: 600; border-bottom: 1px solid var(--border-color); margin-bottom: 5px;">Pilih Engine / Router API:</div>
                        <div id="model-options-container" style="display: flex; flex-direction: column; gap: 4px;">
                            <div style="padding:10px; text-align:center; font-size:0.8rem;">Memuat daftar server dari Admin...</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="avatar-box avatar-user" id="top-right-avatar" style="cursor:pointer;" onclick="window.openSettingsModal()">U</div>
        </header>

        <div class="messages-container" id="chat-box"></div>

        <div class="input-area-wrapper">
            <div class="gemini-input-box">
                <!-- Preview Upload Attachment -->
                <div class="attachment-preview-container" id="attachment-preview">
                    <img src="" id="attach-img-preview" alt="Attachment" style="display: none;">
                    <i class="fa-regular fa-file-code" id="attach-file-icon" style="display: none; font-size: 1.5rem; color: var(--accent-blue);"></i>
                    <div style="display:flex; flex-direction:column; font-size:0.75rem;">
                        <span id="attach-name" style="font-weight:600;">File.png</span>
                        <span style="color:var(--text-secondary);" id="attach-status">Terlampir</span>
                    </div>
                    <button onclick="window.removeAttachment()" style="background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size:1.2rem; margin-left:10px;"><i class="fa-solid fa-xmark"></i></button>
                </div>

                <div class="input-row-bottom">
                    <button class="gemini-input-btn" onclick="document.getElementById('hidden-upload-input').click()" title="Lampirkan File/Gambar"><i class="fa-solid fa-paperclip"></i></button>
                    <input type="file" id="hidden-upload-input" style="display:none;" onchange="window.handleFileUpload(event)">
                    
                    <textarea id="chat-input-textarea" placeholder="Ketik pesan untuk Kreaverse AI atau paste kode di sini..." rows="1" disabled></textarea>
                    
                    <button id="send-chat-btn" class="send-btn-gemini" disabled><i class="fa-solid fa-arrow-up"></i></button>
                </div>
            </div>
            <div class="disclaimer-text">Kreaverse AI dapat melakukan kesalahan. Harap periksa kembali kodingan yang dihasilkan.</div>
        </div>
    </main>

    <!-- FIREBASE & JAVASCRIPT LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, doc, getDoc, getDocs, updateDoc, deleteDoc, setDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        
        // --- KONFIGURASI FIREBASE ANDA (TIDAK DIUBAH) ---
        const firebaseConfig = {
            apiKey: "AIzaSyAO8JV4jkJmbHChYvjUCS7wqfVbKr94tHM",
            authDomain: "kreaverse-ai0107.firebaseapp.com",
            projectId: "kreaverse-ai0107",
            storageBucket: "kreaverse-ai0107.firebasestorage.app",
            messagingSenderId: "1048550433011",
            appId: "1:1048550433011:web:0cf2e4074b20fe09909786"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- KONFIGURASI MARKED.JS (CUSTOM RENDERER UNTUK CODE BLOCK) ---
        const renderer = new marked.Renderer();
        renderer.code = function(code, language) {
            const validLang = !!(language && hljs.getLanguage(language));
            const highlighted = validLang ? hljs.highlight(code, { language }).value : code.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const langText = language ? language.toUpperCase() : 'TEXT / CODE';
            const uniqueId = 'code-' + Math.random().toString(36).substr(2, 9);
            const rawCode = code.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");

            return `
                <div class="code-block-wrapper" id="wrapper-${uniqueId}">
                    <div class="code-block-header">
                        <span class="code-lang-label">${langText}</span>
                        <div class="code-actions-group">
                            <button class="code-action-btn" onclick="window.toggleCodeBlock('${uniqueId}')" title="Buka/Tutup Kode">
                                <i class="fa-solid fa-chevron-up" id="icon-${uniqueId}"></i> Tampil
                            </button>
                            <button class="code-action-btn" onclick="window.copyCodeBlock('${uniqueId}')" title="Copy Kode">
                                <i class="fa-regular fa-copy"></i> Copy
                            </button>
                        </div>
                    </div>
                    <div class="code-block-content" id="content-${uniqueId}">
                        <pre><code class="hljs ${language}">${highlighted}</code></pre>
                    </div>
                    <textarea id="raw-${uniqueId}" style="display:none;">${rawCode}</textarea>
                </div>
            `;
        };
        marked.setOptions({ renderer: renderer, breaks: true });

        // FUNGSI GLOBAL UNTUK TOMBOL DI DALAM KODE MARKDOWN
        window.toggleCodeBlock = function(id) {
            const content = document.getElementById('content-' + id);
            const icon = document.getElementById('icon-' + id);
            if (content.style.display === 'none') {
                content.style.display = 'block';
                icon.classList.replace('fa-chevron-down', 'fa-chevron-up');
            } else {
                content.style.display = 'none';
                icon.classList.replace('fa-chevron-up', 'fa-chevron-down');
            }
        };
        window.copyCodeBlock = function(id) {
            const rawTextArea = document.getElementById('raw-' + id);
            // Decode entitas HTML kembali ke string asli
            const textToCopy = rawTextArea.value.replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&quot;/g, '"').replace(/&#039;/g, "'");
            navigator.clipboard.writeText(textToCopy).then(() => {
                window.showChatToast("✅ Kode berhasil disalin!");
            });
        };

        // VARIABEL GLOBAL PENTING
        const currentUserId = localStorage.getItem('kreaverse_user_id');
        const currentUserName = localStorage.getItem('kreaverse_user_name') || 'User';
        const urlParams = new URLSearchParams(window.location.search);
        let currentChatId = urlParams.get('id'); 
        
        let availableProviders = [];
        let currentModelKey = "auto";
        let currentModelName = "Auto AI Router"; 
        
        let currentBaseUrl = "";   
        let currentEndpoint = "";
        let currentAiApiId = "";   
        let currentApiKey = "";    
        let currentHeaderName = "Authorization";
        let currentHeaderValue = "Bearer ";
        
        let fullConversationHistory = []; // ARRAY PERMANEN UNTUK INGATAN AI
        
        let cloudinaryName = "";
        let cloudinaryPreset = "";
        let activeAttachmentFile = null;

        const chatBox = document.getElementById('chat-box');
        const inputArea = document.getElementById('chat-input-textarea');
        const sendBtn = document.getElementById('send-chat-btn');
        const headerModelName = document.getElementById('header-model-name');
        
        if (!currentUserId) window.location.href = '/login/index.html';
        document.getElementById('top-right-avatar').innerText = currentUserName.charAt(0).toUpperCase();

        window.showChatToast = function(msg) {
            const existing = document.getElementById('chat-toast');
            if(existing) existing.remove();
            const toast = document.createElement('div');
            toast.id = 'chat-toast';
            toast.style.cssText = 'position:fixed; top:20px; left:50%; transform:translateX(-50%); background:var(--accent-blue); color:#FFF; padding:10px 24px; border-radius:30px; font-size:0.9rem; z-index:99999; font-weight:500; font-family:var(--font-main); transition:opacity 0.3s; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.2);';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        };

        // --- FETCH PROVIDER DARI ADMIN DASBOR ---
        async function loadApiProviderDatabase() {
            try {
                const provDoc = await getDoc(doc(db, "settings", "api_providers"));
                if (!provDoc.exists() || !provDoc.data().list) throw new Error("Tabel provider kosong!");
                
                availableProviders = provDoc.data().list.filter(p => p.serviceType === 'llm');
                
                for (let i = 0; i < availableProviders.length; i++) {
                    const prov = availableProviders[i];
                    const qKey = query(collection(db, "api_keys"), where("provider", "==", prov.value), where("status", "==", "aktif"));
                    const keySnap = await getDocs(qKey);
                    if (!keySnap.empty) {
                        const keysList = [];
                        keySnap.forEach(d => keysList.push({ id: d.id, ...d.data() }));
                        keysList.sort((a, b) => (a.priority || 1) - (b.priority || 1));
                        availableProviders[i].activeKey = keysList[0].key; 
                    } else { availableProviders[i].activeKey = null; }
                }
                renderModelDropdown();
                applySelectedModelLogic();
            } catch (e) {
                console.error("Gagal muat Engine:", e);
                window.showChatToast("Sistem AI Offline. Hubungi Admin.");
                inputArea.disabled = true;
            }
        }

        function renderModelDropdown() {
            const container = document.getElementById('model-options-container');
            let html = `
                <div class="model-opt ${currentModelKey === 'auto' ? 'selected' : ''}" onclick="window.selectModel('auto', 'Auto AI Router (Rekomendasi)')">
                    <i class="fa-solid fa-bolt"></i> Auto AI Router (Rekomendasi)
                </div>
            `;
            availableProviders.forEach(p => {
                const isSelected = currentModelKey === p.value ? 'selected' : '';
                const isDead = !p.activeKey ? '<span style="font-size:0.6rem; color:#FF4A4A; border:1px solid #FF4A4A; padding:2px 4px; border-radius:4px; margin-left:auto;">Habis</span>' : '';
                html += `
                    <div class="model-opt ${isSelected}" onclick="window.selectModel('${p.value}', '${p.label}')" ${!p.activeKey ? 'style="opacity:0.5; pointer-events:none;"' : ''}>
                        <i class="fa-solid fa-server"></i> ${p.label} ${isDead}
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        window.toggleModelDropdown = function() { document.getElementById('model-selector-modal').classList.toggle('open'); };
        window.selectModel = function(val, label) {
            currentModelKey = val; currentModelName = label;
            document.getElementById('header-model-name').innerText = label;
            document.getElementById('model-selector-modal').classList.remove('open');
            renderModelDropdown(); applySelectedModelLogic();
            window.showChatToast(`Terkoneksi ke: ${label}`);
        };

        function applySelectedModelLogic() {
            let selectedProv = currentModelKey === 'auto' ? availableProviders.find(p => p.activeKey) : availableProviders.find(p => p.value === currentModelKey);
            if (selectedProv && selectedProv.activeKey) {
                currentApiKey = selectedProv.activeKey;
                currentBaseUrl = selectedProv.baseUrl || "";
                currentEndpoint = selectedProv.endpoint || "/chat/completions";
                currentAiApiId = selectedProv.models ? selectedProv.models.split(',')[0].trim() : "";
                currentHeaderName = selectedProv.headerName || "Authorization";
                currentHeaderValue = (selectedProv.headerValue || "Bearer {apiKey}").replace('{apiKey}', currentApiKey);
            }
        }

        // --- RENDER UI CHAT (ChatGPT Style) ---
        function renderMessageUser(content, attachmentUrl) {
            const row = document.createElement('div');
            row.className = `message-row user-role`;
            
            let attachHtml = attachmentUrl ? `<div style="margin-bottom:10px;"><a href="${attachmentUrl}" target="_blank"><img src="${attachmentUrl}" style="max-width:200px; border-radius:8px; border:1px solid var(--border-color);"></a></div>` : '';
            
            row.innerHTML = `
                <div class="message-content-wrapper">
                    <div class="avatar-box avatar-user">${currentUserName.charAt(0).toUpperCase()}</div>
                    <div class="message-body">
                        ${attachHtml}
                        <div class="user-text-content">${content.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>
                    </div>
                </div>
            `;
            chatBox.appendChild(row);
        }

        function renderMessageAI(content, index) {
            const row = document.createElement('div');
            row.className = `message-row ai-role`;
            row.id = `msg-ai-${index}`;
            
            const formattedContent = marked.parse(content);
            
            row.innerHTML = `
                <div class="message-content-wrapper">
                    <div class="avatar-box avatar-ai"><i class="fa-solid fa-robot"></i></div>
                    <div class="message-body">
                        <div class="markdown-body">${formattedContent}</div>
                        <div class="ai-actions-row">
                            <button class="action-icon-btn" onclick="window.copyText('${encodeURIComponent(content)}')"><i class="fa-regular fa-copy"></i> Copy Respons</button>
                        </div>
                    </div>
                </div>
            `;
            chatBox.appendChild(row);
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function showLoadingBubble() {
            const row = document.createElement('div');
            row.id = 'ai-loading-bubble';
            row.className = `message-row ai-role`;
            row.innerHTML = `
                <div class="message-content-wrapper">
                    <div class="avatar-box avatar-ai" style="opacity:0.7;"><i class="fa-solid fa-circle-notch fa-spin"></i></div>
                    <div class="message-body" style="display:flex; align-items:center;">
                        <span style="color:var(--text-secondary); font-style:italic;">Kreaverse sedang berpikir (Coding/Analisa)...</span>
                    </div>
                </div>
            `;
            chatBox.appendChild(row);
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
        function hideLoadingBubble() {
            const loader = document.getElementById('ai-loading-bubble');
            if (loader) loader.remove();
        }

        // --- SISTEM MEMORI (TIDAK LUPA LAGI) ---
        async function fetchAIResponse() {
            if (!currentApiKey) await loadApiProviderDatabase();
            showLoadingBubble();
            
            // 1. BUAT SYSTEM PROMPT SUPER AI (Rahasia agar AI pintar coding)
            const SYSTEM_PROMPT = `Anda adalah Kreaverse AI, sebuah Asisten Kecerdasan Buatan tingkat lanjut (Super AI) yang sangat ahli dalam pemrograman (Software Engineering), analisis data, dan penyelesaian masalah kompleks.
Aturan penting:
- Selalu ingat konteks percakapan sebelumnya. Jangan pernah lupa apa yang dibahas sebelumnya.
- Jika pengguna meminta revisi kode (Kode Lama menjadi Baru), berikan kode utuh yang siap pakai, efisien, modern, dan tanpa bug.
- Jawab dalam Bahasa Indonesia yang profesional dan natural.
- Format kodingan harus menggunakan Markdown Block dengan nama bahasa yang benar (contoh: \`\`\`html ... \`\`\`).`;

            // 2. SANITASI RIWAYAT (Hapus objek yang bikin API Error)
            // Hanya ambil role dan content murni.
            const sanitizedMessages = fullConversationHistory.map(msg => ({
                role: msg.role,
                content: String(msg.content)
            }));

            // Pastikan tidak melampaui batas token (Ambil 20 percakapan terakhir jika terlalu panjang)
            const recentHistory = sanitizedMessages.slice(-20);

            try {
                const targetUrl = (currentBaseUrl + currentEndpoint).replace(/([^:]\/)\/+/g, "$1");
                const payload = {
                    model: currentAiApiId,
                    messages: [
                        { role: "system", content: SYSTEM_PROMPT },
                        ...recentHistory
                    ],
                    temperature: 0.7,
                    max_tokens: 4000 // Beri ruang besar untuk membalas codingan panjang
                };

                const response = await fetch(targetUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', [currentHeaderName]: currentHeaderValue },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const err = await response.text();
                    throw new Error(`Error API (${response.status}): Server AI sedang penuh atau konfigurasi salah.`);
                }

                const data = await response.json();
                const aiReplyText = data.choices[0].message.content;

                hideLoadingBubble();
                
                // SIMPAN BALASAN AI KE MEMORI
                const newIndex = fullConversationHistory.length;
                fullConversationHistory.push({ role: "assistant", content: aiReplyText });
                
                renderMessageAI(aiReplyText, newIndex);

                // SIMPAN KE DATABASE FIREBASE
                if (!currentChatId) {
                    const newChatRef = doc(collection(db, 'chat_sessions'));
                    currentChatId = newChatRef.id;
                    window.history.pushState({}, '', '/chat/index.html?id=' + currentChatId);
                    
                    const titleGen = fullConversationHistory[0].content.substring(0, 35) + '...';
                    await setDoc(newChatRef, {
                        userId: currentUserId,
                        title: titleGen.replace(/\[Lampiran\]: /g, ''),
                        model: currentModelName,
                        messages: fullConversationHistory,
                        createdAt: Date.now(),
                        updatedAt: Date.now()
                    });
                } else {
                    await updateDoc(doc(db, 'chat_sessions', currentChatId), {
                        messages: fullConversationHistory,
                        updatedAt: Date.now()
                    });
                }

            } catch (error) {
                hideLoadingBubble();
                renderMessageAI(`⚠️ **Koneksi Terputus.**\n\nSistem AI Gagal merespons. Pastikan API Router aktif di Dasbor Admin.\n*Pesan Error: ${error.message}*`);
                // Hapus pesan user terakhir dari memori agar bisa diretry
                fullConversationHistory.pop(); 
            }
        }

        // --- UPLOAD GAMBAR CLOUDINARY ---
        async function uploadFileToCloudinary(file) {
            try {
                const snap = await getDocs(query(collection(db, "cloudinary_accounts"), where("status", "==", "aktif")));
                if (!snap.empty) { cloudinaryName = snap.docs[0].data().cloudName; cloudinaryPreset = snap.docs[0].data().uploadPreset; }
                if (!cloudinaryName) return null;

                window.showChatToast("Mengunggah lampiran...");
                const formData = new FormData(); formData.append('file', file); formData.append('upload_preset', cloudinaryPreset);
                const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudinaryName}/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                return data.secure_url;
            } catch (e) { return null; }
        }

        window.handleFileUpload = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            activeAttachmentFile = file;
            document.getElementById('attach-name').innerText = file.name;
            const imgPreview = document.getElementById('attach-img-preview');
            const iconPreview = document.getElementById('attach-file-icon');
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = e => { imgPreview.src = e.target.result; imgPreview.style.display = 'block'; iconPreview.style.display = 'none'; };
                reader.readAsDataURL(file);
            } else { imgPreview.style.display = 'none'; iconPreview.style.display = 'block'; }
            document.getElementById('attachment-preview').classList.add('active');
            inputArea.focus(); sendBtn.disabled = false; sendBtn.classList.add('active');
        };

        window.removeAttachment = function() {
            activeAttachmentFile = null; document.getElementById('hidden-upload-input').value = "";
            document.getElementById('attachment-preview').classList.remove('active');
            if (inputArea.value.trim() === '') { sendBtn.disabled = true; sendBtn.classList.remove('active'); }
        };

        // --- EVENT KIRIM PESAN ---
        sendBtn.addEventListener('click', async () => {
            const userText = inputArea.value.trim();
            if (!userText && !activeAttachmentFile) return;

            inputArea.value = ''; inputArea.style.height = 'auto'; inputArea.disabled = true;
            sendBtn.disabled = true; sendBtn.classList.remove('active');

            let attachmentUrl = null;
            if (activeAttachmentFile) {
                document.getElementById('attach-status').innerText = "Uploading...";
                attachmentUrl = await uploadFileToCloudinary(activeAttachmentFile);
                window.removeAttachment();
                document.getElementById('attach-status').innerText = "Terlampir";
            }

            // Tampilkan UI User
            renderMessageUser(userText, attachmentUrl);
            
            // Masukkan ke Memori AI (Context)
            let promptText = userText;
            if (attachmentUrl) promptText = `[Lampiran Gambar/File Terkait]: ${attachmentUrl} \n\n${userText}`;
            
            fullConversationHistory.push({ role: "user", content: promptText });
            
            // Eksekusi Panggilan AI
            await fetchAIResponse();
            inputArea.disabled = false; inputArea.focus();
        });

        // --- GLOBAL UI ACTIONS ---
        window.startNewChat = () => { window.location.href = '/chat/index.html'; };
        window.copyText = function(encodedText) { navigator.clipboard.writeText(decodeURIComponent(encodedText)).then(() => window.showChatToast("Disalin!")); };

        // Realtime Sidebar List
        const q = query(collection(db, 'chat_sessions'), where('userId', '==', currentUserId));
        let historyDataGlobal = [];
        onSnapshot(q, (snapshot) => {
            historyDataGlobal = [];
            snapshot.forEach(docSnap => historyDataGlobal.push({ id: docSnap.id, ...docSnap.data() }));
            historyDataGlobal.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
            window.filterHistory();
        });

        window.filterHistory = function() {
            const keyword = document.getElementById('history-search-input').value.toLowerCase();
            const container = document.getElementById('history-list-container');
            container.innerHTML = '';
            
            const filtered = keyword ? historyDataGlobal.filter(item => item.title.toLowerCase().includes(keyword)) : historyDataGlobal;
            if (filtered.length === 0) { container.innerHTML = '<div style="padding:15px; color:#888; font-size:0.8rem; text-align:center;">Tidak ada riwayat</div>'; return; }

            filtered.forEach(data => {
                const div = document.createElement('div');
                div.className = `history-item-gemini ${data.id === currentChatId ? 'active' : ''}`;
                div.onclick = () => window.location.href = `/chat/index.html?id=${data.id}`;
                div.innerHTML = `
                    <div class="history-text"><i class="fa-regular fa-message" style="margin-right:8px; opacity:0.7;"></i> ${data.title}</div>
                    <div class="history-actions" onclick="event.stopPropagation()">
                        <button class="hist-btn" onclick="window.deleteSingleChat('${data.id}')"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
                container.appendChild(div);
            });
        };

        window.deleteSingleChat = async function(id) {
            if(confirm("Hapus obrolan ini permanen?")) {
                await deleteDoc(doc(db, 'chat_sessions', id));
                if (id === currentChatId) window.location.href = '/chat/index.html';
            }
        };

        // SETUP AWAL SAAT HALAMAN DIBUKA
        async function initializeAppFull() {
            // Set Default Theme ke Dark (Pro Mode)
            if (!localStorage.getItem('kreaverse_theme')) localStorage.setItem('kreaverse_theme', 'dark');
            if (localStorage.getItem('kreaverse_theme') === 'dark') document.body.classList.add('dark-theme');
            document.getElementById('setting-tema').value = localStorage.getItem('kreaverse_theme');

            await loadApiProviderDatabase();

            if (currentChatId) {
                // MUAT RIWAYAT DARI FIREBASE (MEMORI)
                const chatDoc = await getDoc(doc(db, 'chat_sessions', currentChatId));
                if (chatDoc.exists() && chatDoc.data().userId === currentUserId) {
                    const data = chatDoc.data();
                    currentModelName = data.model || "Auto AI Router";
                    headerModelName.textContent = currentModelName;
                    
                    fullConversationHistory = data.messages || [];
                    
                    // Render Riwayat ke Layar
                    fullConversationHistory.forEach((msg, idx) => {
                        if (msg.role === 'user') {
                            const isLink = msg.content.match(/\[Lampiran Gambar\/File Terkait\]: (https?:\/\/[^\s]+)/);
                            const realText = msg.content.replace(/\[Lampiran Gambar\/File Terkait\]: https?:\/\/[^\s]+ \n\n/g, '');
                            renderMessageUser(realText, isLink ? isLink[1] : null);
                        }
                        else renderMessageAI(msg.content, idx);
                    });
                    inputArea.disabled = false;
                } else window.location.href = '/chat/index.html';
            } else {
                // Tampilan Chat Kosong Baru
                chatBox.innerHTML = `
                <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; opacity:0.8;">
                    <i class="fa-solid fa-code" style="font-size: 3rem; color: var(--accent-blue); margin-bottom: 20px;"></i>
                    <h2 style="font-weight:600; font-size:1.6rem; text-align:center;">Kreaverse Pro AI</h2>
                    <p style="color:var(--text-secondary); text-align:center; max-width:400px; margin-top:10px; line-height:1.6; font-size:0.9rem;">
                        Asisten canggih untuk <b>Coding</b>, analisis logika kompleks, dan penulisan. Dilengkapi memori percakapan berantai.
                    </p>
                </div>`;
                inputArea.disabled = false;
            }
        }

        window.openSettingsModal = () => { document.getElementById('setting-nama').value = localStorage.getItem('kreaverse_user_name') || ''; document.getElementById('gemini-settings-modal').style.display = 'flex'; };
        window.closeSettingsModal = () => document.getElementById('gemini-settings-modal').style.display = 'none';
        window.saveSettingsModal = async () => {
            const nama = document.getElementById('setting-nama').value.trim();
            const tema = document.getElementById('setting-tema').value;
            localStorage.setItem('kreaverse_user_name', nama); localStorage.setItem('kreaverse_theme', tema);
            if (tema === 'dark') document.body.classList.add('dark-theme'); else document.body.classList.remove('dark-theme');
            window.closeSettingsModal(); window.showChatToast("Setelan disimpan! Muat ulang untuk melihat nama baru.");
        };

        // UI Controls Input
        document.getElementById('open-sidebar-btn').onclick = () => { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('active'); };
        document.getElementById('close-sidebar-btn').onclick = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('active'); };
        document.getElementById('sidebar-overlay').onclick = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('active'); };
        
        inputArea.addEventListener('input', function() {
            this.style.height = 'auto'; this.style.height = (this.scrollHeight < 200 ? this.scrollHeight : 200) + 'px';
            if (this.value.trim() !== '' || activeAttachmentFile) { sendBtn.disabled = false; sendBtn.classList.add('active'); } 
            else { sendBtn.disabled = true; sendBtn.classList.remove('active'); }
        });
        inputArea.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) sendBtn.click(); } });

        initializeAppFull();
    </script>
</body>
</html>

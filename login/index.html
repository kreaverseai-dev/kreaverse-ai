<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masuk - Kreaverse</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&family=Poppins:wght@500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #FAF8F5; --text-main: #111111; --text-muted: #666666; --border: #E5E5E5; --card: #FFFFFF; }
        
        /* MATIKAN GESER KANAN-KIRI SIKU DI HP */
        html, body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            align-items: center; 
            overflow-x: hidden !important; 
            touch-action: pan-y !important; 
        }
        
        .header { width: 100%; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; position: relative; z-index: 100; }
        .logo-container { display: flex; align-items: center; width: 150px; height: 38px; }
        
        .menu-btn { font-size: 1.4rem; color: #111; cursor: pointer; background: none; border: none; padding: 5px; }
        .dropdown-menu { position: absolute; top: 60px; right: 30px; background: #fff; border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 200px; display: none; flex-direction: column; overflow: hidden; }
        .dropdown-menu.show { display: flex; }
        .dropdown-item { padding: 15px 20px; color: var(--text-main); text-decoration: none; font-weight: 500; font-size: 0.95rem; border-bottom: 1px solid var(--border); transition: 0.2s; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .dropdown-item:hover { background: #f9f9f9; }
        .dropdown-item:last-child { border-bottom: none; }

        .main-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; max-width: 480px; padding: 20px; text-align: center; }
        .hero-title { font-family: 'Playfair Display', serif; font-size: 2.4rem; font-weight: 600; color: var(--text-main); margin-top: 0; margin-bottom: 10px; line-height: 1.2; }
        .hero-subtitle { font-size: 1rem; color: var(--text-muted); margin-bottom: 30px; padding: 0 10px; }

        .login-box { background: var(--card); padding: 30px; border-radius: 24px; width: 100%; box-sizing: border-box; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.04); margin-bottom: 20px; }
        
        .btn-google { width: 100%; padding: 14px; background: #fff; color: var(--text-main); border: 1px solid var(--border); border-radius: 12px; font-weight: 600; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; font-family: 'Inter', sans-serif; position: relative; }
        .btn-google:hover { background: #F5F5F5; }
        .btn-google:disabled { opacity: 0.7; cursor: not-allowed; }
        .btn-google svg { width: 18px; height: 18px; }
        
        .divider { margin: 25px 0; color: #999; font-size: 0.85rem; display: flex; align-items: center; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }

        input { width: 100%; padding: 14px 16px; margin-bottom: 15px; background: #fff; border: 1px solid var(--border); color: var(--text-main); border-radius: 12px; box-sizing: border-box; font-size: 1rem; font-family: 'Inter', sans-serif; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--text-main); box-shadow: 0 0 0 2px rgba(0,0,0,0.05); }
        input.error { border-color: #dc3545; box-shadow: 0 0 0 2px rgba(220,53,69,0.1); }
        
        .btn-email { width: 100%; padding: 14px; background: var(--text-main); color: white; border: none; border-radius: 12px; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: 0.2s; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-email:hover:not(:disabled) { background: #333; }
        .btn-email:disabled { opacity: 0.6; cursor: not-allowed; }

        .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
        .spinner.dark { border: 2px solid rgba(0,0,0,0.2); border-top-color: #000; }
        .btn-email.loading .spinner, .btn-google.loading .spinner { display: inline-block; }
        .btn-email.loading .btn-text, .btn-google.loading .btn-text, .btn-google.loading svg { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .terms { font-size: 0.75rem; color: #999; margin-top: 20px; line-height: 1.5; }
        .terms a { color: var(--text-muted); text-decoration: underline; cursor: pointer; }

        .footer { padding: 20px; font-size: 0.85rem; color: #999; width: 100%; text-align: center; }

        /* CUSTOM MODAL - DIOPTIMALKAN AGAR TIDAK KEBESARAN DI HP */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); /* Menghapus blur berat agar performa scroll lancar */
            display: flex; justify-content: center; align-items: center; 
            z-index: 9999; opacity: 0; visibility: hidden; 
            transition: all 0.3s; padding: 20px; box-sizing: border-box; 
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .custom-modal { 
            background: #fff; 
            width: 100%; 
            max-width: 320px; /* Diperkecil dari 400px agar pas di HP */
            padding: 24px; /* Diperkecil dari 30px */
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            transform: translateY(20px); 
            transition: 0.3s; 
            box-sizing: border-box;
        }
        .modal-overlay.active .custom-modal { transform: translateY(0); }
        .modal-icon { font-size: 2.2rem; margin-bottom: 12px; }
        .modal-title { font-size: 1.15rem; font-weight: 700; color: #111; margin-bottom: 8px; }
        .modal-desc { font-size: 0.85rem; color: #666; line-height: 1.5; margin-bottom: 20px; }
        .modal-actions { display: flex; flex-direction: column; gap: 8px; }
        .btn-modal-primary { 
            background: #111; color: #fff; border: none; 
            padding: 12px; border-radius: 10px; font-weight: 600; 
            cursor: pointer; width: 100%; text-decoration: none; 
            font-size: 0.9rem; display: block; text-align: center; 
            box-sizing: border-box; font-family: 'Inter', sans-serif; 
        }
        .btn-modal-primary:hover { background: #333; }
        .btn-modal-secondary { 
            background: #fff; color: #111; border: 1px solid var(--border); 
            padding: 12px; border-radius: 10px; font-weight: 600; 
            cursor: pointer; width: 100%; text-decoration: none; 
            font-size: 0.9rem; display: block; text-align: center; 
            box-sizing: border-box; font-family: 'Inter', sans-serif; 
        }
        .btn-modal-secondary:hover { background: #f5f5f5; }

        .modal-blocked .custom-modal { border-top: 4px solid #dc3545; }

        @media (max-width: 480px) {
            .hero-title { font-size: 1.8rem; }
            .hero-subtitle { font-size: 0.9rem; }
            .login-box { padding: 25px 20px; border-radius: 20px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" style="width:100%; height:100%; display:block;">
                <defs>
                    <linearGradient id="kreaGradientLogin" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#D97757" />
                        <stop offset="50%" stop-color="#AF52DE" />
                        <stop offset="100%" stop-color="#007AFF" />
                    </linearGradient>
                </defs>
                <g>
                    <path d="M 30,10 Q 30,30 50,30 Q 30,30 30,50 Q 30,30 10,30 Q 30,30 30,10 Z" fill="url(#kreaGradientLogin)" />
                    <path d="M 30,17 Q 30,30 43,30 Q 30,30 30,43 Q 30,30 17,30 Q 30,30 30,17 Z" fill="url(#kreaGradientLogin)" transform="rotate(45, 30, 30)" opacity="0.85" />
                </g>
                <text x="65" y="38" font-family="'Poppins', 'Inter', sans-serif" font-weight="800" font-size="21" fill="#111111" letter-spacing="-0.5px">
                    Kreaverse<tspan font-weight="500" fill="#D97757"> AI</tspan>
                </text>
            </svg>
        </div>
        <button class="menu-btn" id="menuToggleBtn"><i class="fa-solid fa-bars"></i></button>
        <div class="dropdown-menu" id="topMenu">
            <a href="/index.html" class="dropdown-item"><i class="fa-solid fa-house"></i> Beranda</a>
            <div class="dropdown-item" id="aksesInfoBtn"><i class="fa-solid fa-key"></i> Akses Login</div>
        </div>
    </div>

    <div class="main-content">
        <h1 class="hero-title">Berpikir cepat,<br>berkreasi lebih hebat</h1>
        <p class="hero-subtitle">Curahkan ide Anda, wujudkan di Kreaverse.</p>

        <div class="login-box">
            <!-- GOOGLE LOGIN (KHUSUS ADMIN) -->
            <button type="button" class="btn-google" id="btnGoogle">
                <span class="spinner dark"></span>
                <svg viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span class="btn-text">Lanjutkan dengan Google</span>
            </button>

            <div class="divider">khusus klien</div>

            <form id="loginForm" novalidate>
                <input type="email" id="emailInput" placeholder="Masukkan email klien Anda" autocomplete="off" spellcheck="false">
                <button type="submit" class="btn-email" id="btnSubmit">
                    <span class="spinner"></span>
                    <span class="btn-text">Lanjutkan dengan email</span>
                </button>
            </form>

            <div class="terms">
                Dengan melanjutkan, Anda menyetujui<br>
                <a href="/privasi">Kebijakan Privasi</a> dan <a href="/ketentuan">Ketentuan</a> Kreaverse.
            </div>
        </div>
    </div>

    <div class="footer">Copyright &copy; 2026 Kreaverse AI</div>

    <!-- CUSTOM MODAL -->
    <div class="modal-overlay" id="customModalOverlay">
        <div class="custom-modal">
            <div class="modal-icon" id="modalIcon"></div>
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-desc" id="modalDesc"></div>
            <div class="modal-actions" id="modalActions"></div>
        </div>
    </div>

    <!-- FIREBASE MODULAR SDK -->
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, setDoc, updateDoc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getDatabase, ref, set, onValue, onDisconnect, serverTimestamp as rtdbTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // ============================================================
    // FIREBASE INIT
    // ============================================================
    const firebaseConfig = {
        apiKey: "AIzaSyAO8JV4jkJmbHChYvjUCS7wqfVbKr94tHM",
        authDomain: "kreaverse-ai0107.firebaseapp.com",
        databaseURL: "https://kreaverse-ai0107-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "kreaverse-ai0107",
        storageBucket: "kreaverse-ai0107.firebasestorage.app",
        messagingSenderId: "1048550433011",
        appId: "1:1048550433011:web:0cf2e4074b20fe09909786",
        measurementId: "G-CJHMKKYQ4C"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const rtdb = getDatabase(app);
    const googleProvider = new GoogleAuthProvider();

    // ============================================================
    // KONSTANTA ADMIN EMAIL LIST
    // ============================================================
    const ALLOWED_ADMINS = [
        "holifhidayah@gmail.com",
        "alluraveylia@gmail.com",
        "kreaverse.ai@gmail.com",
        "habigeneratewebsite@gmail.com",
        "habiwebsite@gmail.com"
    ];

    // CEGAH AKSES JIKA SUDAH LOGIN
    if (localStorage.getItem('kreaverse_logged_in') === 'true') {
        window.location.href = '/index.html';
    }

    // ============================================================
    // HELPER : CUSTOM MODAL
    // ============================================================
    const modalOverlay = document.getElementById('customModalOverlay');
    const modalIcon    = document.getElementById('modalIcon');
    const modalTitle   = document.getElementById('modalTitle');
    const modalDesc    = document.getElementById('modalDesc');
    const modalActions = document.getElementById('modalActions');

    window.showModal = function(title, desc, type, actionsHTML = '') {
        modalTitle.textContent = title;
        modalDesc.textContent  = desc;

        const icons = {
            error   : '<i class="fa-solid fa-triangle-exclamation" style="color:#dc3545;"></i>',
            success : '<i class="fa-solid fa-circle-check" style="color:#10b981;"></i>',
            info    : '<i class="fa-solid fa-circle-info" style="color:#1A73E8;"></i>',
            blocked : '<i class="fa-solid fa-ban" style="color:#dc3545;"></i>',
            key     : '<i class="fa-solid fa-key" style="color:#D97757;"></i>'
        };
        modalIcon.innerHTML = icons[type] || icons.info;
        modalOverlay.classList.toggle('modal-blocked', type === 'blocked');

        modalActions.innerHTML = actionsHTML || `<button class="btn-modal-primary" id="btnModalClose">Mengerti</button>`;
        modalOverlay.classList.add('active');

        const closeBtn = document.getElementById('btnModalClose');
        if (closeBtn) closeBtn.addEventListener('click', closeModal);
    }

    function closeModal() {
        modalOverlay.classList.remove('active');
        modalOverlay.classList.remove('modal-blocked');
    }

    modalOverlay.addEventListener('click', e => {
        if (e.target === modalOverlay) closeModal();
    });

    // ============================================================
    // HELPER : TOGGLE MENU
    // ============================================================
    document.getElementById('menuToggleBtn').addEventListener('click', () => {
        document.getElementById('topMenu').classList.toggle('show');
    });
    
    document.addEventListener('click', e => {
        const menu = document.getElementById('topMenu');
        const btn  = document.getElementById('menuToggleBtn');
        if (!menu.contains(e.target) && !btn.contains(e.target)) {
            menu.classList.remove('show');
        }
    });

    // ============================================================
    // INFO AKSES LOGIN
    // ============================================================
    document.getElementById('aksesInfoBtn').addEventListener('click', () => {
        document.getElementById('topMenu').classList.remove('show');
        window.showModal(
            'Cara Mendapatkan Akses',
            'Kreaverse AI adalah platform eksklusif. Untuk mendapatkan email login klien, Anda perlu berlangganan paket kami terlebih dahulu. Admin akan membuatkan akun untuk Anda.',
            'key',
            `<a href="/harga/index.html" class="btn-modal-primary">
                <i class="fa-solid fa-tag"></i> Lihat Harga Paket
             </a>
             <a href="https://wa.me/6285119821813" target="_blank" class="btn-modal-secondary">
                <i class="fa-brands fa-whatsapp" style="color:#25D366;"></i> Hubungi Admin (WA)
             </a>
             <button class="btn-modal-secondary" style="border:none;color:#999;" id="btnModalClose">Tutup</button>`
        );
    });

    // ============================================================
    // HELPER : SET LOADING STATE
    // ============================================================
    function setLoading(state, isGoogle = false) {
        const btnEmail = document.getElementById('btnSubmit');
        const btnGoogle = document.getElementById('btnGoogle');
        if (state) {
            if(isGoogle) btnGoogle.classList.add('loading');
            else btnEmail.classList.add('loading');
            btnEmail.disabled = true;
            btnGoogle.disabled = true;
        } else {
            btnGoogle.classList.remove('loading');
            btnEmail.classList.remove('loading');
            btnEmail.disabled = false;
            btnGoogle.disabled = false;
        }
    }

    // ============================================================
    // HELPER : SIMPAN SESI KE LOCALSTORAGE
    // ============================================================
    function saveSession(data) {
        localStorage.setItem('kreaverse_logged_in',   'true');
        localStorage.setItem('kreaverse_user_email',  data.email  || '');
        localStorage.setItem('kreaverse_user_id',     data.uid    || '');
        localStorage.setItem('kreaverse_user_name',   data.name   || '');
        localStorage.setItem('kreaverse_role',        data.role   || 'user');
        localStorage.setItem('kreaverse_tier',        data.tier   || 'basic');
        localStorage.setItem('kreaverse_credits',     String(data.credits ?? 0));
    }

    // ============================================================
    // PRESENCE ONLINE SYSTEM (REALTIME DB)
    // ============================================================
    async function setPresenceOnline(uid) {
        if (!uid || !rtdb) return;
        const userRef = ref(rtdb, '/presence/' + uid);
        const connectedRef = ref(rtdb, '.info/connected');
        
        onValue(connectedRef, async (snap) => {
            if (snap.val() === true) {
                await onDisconnect(userRef).set({ state: 'offline', last_changed: rtdbTimestamp() });
                await set(userRef, { 
                    state: 'online', 
                    last_changed: rtdbTimestamp(),
                    user_agent: navigator.userAgent,
                    page: window.location.pathname,
                    connected_at: Date.now()
                });
            }
        });
    }

    // ============================================================
    // LOGIN GOOGLE KHUSUS ADMIN
    // ============================================================
    document.getElementById('btnGoogle').addEventListener('click', async () => {
        setLoading(true, true);
        try {
            const result = await signInWithPopup(auth, googleProvider);
            const user = result.user;
            
            if (ALLOWED_ADMINS.includes(user.email)) {
                // AUTO-SINKRONISASI KE FIRESTORE KHUSUS ADMIN
                const usersRef = collection(db, 'users');
                const q = query(usersRef, where('email', '==', user.email.toLowerCase()));
                const snapshot = await getDocs(q);
                
                let adminUid = user.uid;
                if (snapshot.empty) {
                    await setDoc(doc(db, 'users', adminUid), {
                        email: user.email.toLowerCase(),
                        role: 'admin',
                        tier: 'max_lifetime',
                        nama: user.displayName || 'Admin',
                        createdAt: serverTimestamp(),
                        lastLogin: serverTimestamp(),
                        isOnline: true
                    });
                } else {
                    adminUid = snapshot.docs[0].id;
                    await updateDoc(doc(db, 'users', adminUid), {
                        lastLogin: serverTimestamp(),
                        isOnline: true
                    });
                }

                saveSession({
                    email   : user.email,
                    uid     : adminUid,
                    name    : user.displayName || 'Admin',
                    role    : 'admin',
                    tier    : 'max',
                    credits : -1
                });
                window.showModal('Akses Admin Diberikan', 'Selamat datang kembali, Admin. Mengalihkan ke dashboard utama...', 'success');
                await setPresenceOnline(adminUid);
                setTimeout(() => { window.location.href = '/index.html'; }, 1500);
            } else {
                await signOut(auth); // Usir pengguna non-admin
                window.showModal('Akses Ditolak', 'Akun Google Anda tidak terdaftar sebagai pengelola sistem (Admin). Silakan gunakan form email di bawah jika Anda adalah klien.', 'error');
                setLoading(false, true);
            }
        } catch (error) {
            window.showModal('Gagal Masuk', error.message, 'error');
            setLoading(false, true);
        }
    });

    // ============================================================
    // LOGIN EMAIL KHUSUS KLIEN / USER (CEK DATABASE FIRESTORE)
    // ============================================================
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const emailInput = document.getElementById('emailInput');
        const email = emailInput.value.toLowerCase().trim();

        if (!email) {
            emailInput.classList.add('error');
            emailInput.focus();
            setTimeout(() => emailInput.classList.remove('error'), 2000);
            return;
        }

        setLoading(true, false);

        try {
            // FIX DEADLOCK: Masuk secara Anonim ke Firebase Auth TERLEBIH DAHULU
            // agar diizinkan melakukan query membaca database (memenuhi Rules request.auth != null)
            try {
                await signInAnonymously(auth);
            } catch (authErr) {
                console.warn("Gagal login anonim, melanjutkan session...", authErr);
            }

            const usersRef = collection(db, 'users');
            const q = query(usersRef, where('email', '==', email));
            const snapshot = await getDocs(q);

            if (snapshot.empty) {
                // Jika email tidak terdaftar, keluarkan dari Auth anonim demi keamanan
                await signOut(auth);
                window.showModal(
                    'Akses Ditolak',
                    'Email ini belum terdaftar di sistem kami. Akun hanya bisa dibuat oleh Admin setelah Anda berlangganan. Silakan hubungi Admin.',
                    'error'
                );
                setLoading(false, false);
                return;
            }

            const docSnap = snapshot.docs[0];
            const data    = docSnap.data();
            const uid     = docSnap.id;

            // CEK BLOKIR
            if (data.blocked === true) {
                const until = data.blockedUntil ? new Date(data.blockedUntil) : null;
                const now   = new Date();

                if (!until || until > now) {
                    const untilStr = until ? `hingga ${until.toLocaleString('id-ID')}` : 'sampai batas waktu tidak ditentukan';
                    window.showModal(
                        'Akun Diblokir',
                        `Akun Anda sedang diblokir oleh Admin ${untilStr}. Hubungi Admin untuk informasi lebih lanjut.`,
                        'blocked',
                        `<a href="https://wa.me/6285119821813" target="_blank" class="btn-modal-primary">
                            <i class="fa-brands fa-whatsapp"></i> Hubungi Admin
                         </a>
                         <button class="btn-modal-secondary" id="btnModalClose">Tutup</button>`
                    );
                    await signOut(auth); // Keluarkan dari sesi anonim jika diblokir
                    setLoading(false, false);
                    return;
                } else {
                    await updateDoc(doc(db, 'users', uid), { blocked: false, blockedUntil: null });
                }
            }

            // CEK TIER & EXPIRY
            const tier      = data.tier || 'basic';
            const credits   = data.credits ?? 0;
            const expiresAt = data.expiry ? new Date(data.expiry) : null;

            if (tier !== 'max' && tier !== 'max_lifetime' && expiresAt && expiresAt < new Date()) {
                window.showModal(
                    'Paket Kadaluarsa',
                    `Paket ${tier.toUpperCase()} Anda sudah berakhir. Silakan perpanjang langganan untuk melanjutkan akses.`,
                    'error',
                    `<a href="/harga/index.html" class="btn-modal-primary">
                        <i class="fa-solid fa-tag"></i> Perpanjang Paket
                     </a>
                     <a href="https://wa.me/6285119821813" target="_blank" class="btn-modal-secondary">
                        <i class="fa-brands fa-whatsapp" style="color:#25D366;"></i> Hubungi Admin
                     </a>
                     <button class="btn-modal-secondary" style="border:none;color:#999;" id="btnModalClose">Tutup</button>`
                );
                await signOut(auth); // Keluarkan dari sesi anonim jika kedaluwarsa
                setLoading(false, false);
                return;
            }

            // SIMPAN SESI & UPDATE DB
            saveSession({ email, uid, name: data.nama || '', role: 'user', tier, credits });
            await updateDoc(doc(db, 'users', uid), { isOnline: true, lastLogin: serverTimestamp() });
            await setPresenceOnline(uid);

            window.showModal('Akses Diberikan', 'Mempersiapkan ruang kerja AI Anda...', 'success', '');
            setTimeout(() => { window.location.href = '/index.html'; }, 1500);

        } catch (err) {
            console.error('Login error:', err);
            window.showModal('Gangguan Server', 'Gagal terhubung ke database. Periksa koneksi internet Anda dan coba beberapa saat lagi.', 'error');
            setLoading(false, false);
        }
    });
    </script>

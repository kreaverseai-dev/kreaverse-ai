<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LyricShot AI - Kreaverse AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --accent-purple: #8b5cf6;
            --accent-purple-hover: #7c3aed;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(139, 92, 246, 0.15);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; width: 100%; margin-top: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: #fff; font-size: 2rem; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        h1 span { color: var(--accent-purple); }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; }
        .input-section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            margin-bottom: 30px;
        }
        textarea {
            width: 100%;
            height: 130px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            padding: 15px;
            font-size: 0.95rem;
            font-family: inherit;
            resize: vertical;
        }
        textarea:focus { outline: none; border-color: var(--accent-purple); }
        .options-bar {
            margin: 20px 0;
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        @media (min-width: 600px) {
            .options-bar { grid-template-columns: 1fr 1fr; }
        }
        .option-group { display: flex; flex-direction: column; gap: 6px; }
        .option-group label { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
        select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px 12px;
            border-radius: 6px;
            font-family: inherit;
            cursor: pointer;
        }
        .duration-info {
            background: rgba(139, 92, 246, 0.08);
            border-left: 4px solid var(--accent-purple);
            padding: 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-bottom: 15px;
            color: #fff;
        }
        .upload-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }
        .upload-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 10px;
        }
        @media (min-width: 600px) {
            .upload-grid { grid-template-columns: 1fr 1fr; }
        }
        .file-input-group { display: flex; flex-direction: column; gap: 6px; }
        .file-input-group label { font-size: 0.8rem; color: var(--text-muted); }
        .file-input-group input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.8rem;
        }
        button {
            background: var(--accent-purple);
            color: #fff;
            border: none;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover { background: var(--accent-purple-hover); }
        button:disabled { background: #4b5563; color: #9ca3af; cursor: not-allowed; }
        #loading { text-align: center; font-size: 1.1rem; color: var(--accent-purple); margin: 40px 0; font-weight: 500; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        .hidden { display: none !important; }
        #resultContainer h2 { font-size: 1.4rem; margin-bottom: 20px; border-left: 4px solid var(--accent-purple); padding-left: 12px; }
        #storyboardGrid { display: grid; grid-template-columns: 1fr; gap: 25px; margin-top: 15px; }
        @media (min-width: 768px) {
            #storyboardGrid { grid-template-columns: 1fr 1fr; }
        }
        .storyboard-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .card-header {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .scene-badge { background: var(--accent-purple); color: #fff; font-weight: 700; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; }
        .shot-type { color: var(--accent-purple); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }
        .card-body { padding: 20px; display: flex; flex-direction: column; gap: 15px; flex-grow: 1; }
        .lyrics-quote { color: #fff; font-style: italic; background: rgba(139, 92, 246, 0.08); padding: 10px 15px; border-radius: 6px; border-left: 4px solid var(--accent-purple); margin: 0; font-size: 0.9rem; }
        .description { font-size: 0.9rem; line-height: 1.6; color: #d1d5db; }
        .video-box { margin-top: 10px; border-radius: 8px; overflow: hidden; background: #000; display: flex; justify-content: center; }
        video { width: 100%; max-height: 250px; display: block; }
        .download-btn {
            background: #10b981;
            color: #fff;
            text-align: center;
            text-decoration: none;
            display: block;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .download-btn:hover { background: #059669; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>LyricShot AI <span>🎬</span></h1>
            <p class="subtitle">Ubah lirik lagu Anda menjadi storyboard video klip (MV) siap produksi.</p>
        </header>

        <div class="input-section">
            <textarea id="lyricsInput" placeholder="Masukkan lirik lagu Anda di sini...&#10;Contoh: Kuberjalan di bawah rintik hujan, mencari bayangmu yang perlahan sirna..." oninput="calculateDuration()"></textarea>
            
            <div id="durationDisplay" class="duration-info hidden"></div>

            <div class="options-bar" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                <div class="option-group">
                    <label for="providerNaskahSelect">Provider AI (Naskah/Lirik):</label>
                    <select id="providerNaskahSelect" onchange="updateNaskahModels()"></select>
                </div>
                <div class="option-group">
                    <label for="modelNaskahSelect">Model AI (Naskah):</label>
                    <select id="modelNaskahSelect"></select>
                </div>
                <div class="option-group">
                    <label for="providerSelect">Provider AI (Video):</label>
                    <select id="providerSelect" onchange="updateVideoModels(); toggleUploadFields();"></select>
                </div>
                <div class="option-group">
                    <label for="modelVideoSelect">Model AI (Video):</label>
                    <select id="modelVideoSelect"></select>
                </div>
                <div class="option-group" style="grid-column: span 2;">
                    <label for="ratioSelect">Resolusi Video:</label>
                    <select id="ratioSelect">
                        <option value="9:16">TikTok / Shorts (Vertikal 9:16)</option>
                        <option value="16:9">YouTube (Horizontal 16:9)</option>
                    </select>
                </div>
            </div>

            <!-- Upload Atribut Karakter untuk Magic Hour -->
            <div id="magicHourUploads" class="upload-section hidden">
                <h3 style="font-size: 0.95rem; margin-bottom: 10px; color: var(--accent-purple);">Kunci Atribut Karakter (Magic Hour)</h3>
                <div class="upload-grid">
                    <div class="file-input-group">
                        <label for="faceInput">Foto Wajah (Lock Wajah):</label>
                        <input type="file" id="faceInput" accept="image/*">
                    </div>
                    <div class="file-input-group">
                        <label for="hijabInput">Foto Hijab (Opsional):</label>
                        <input type="file" id="hijabInput" accept="image/*">
                    </div>
                    <div class="file-input-group">
                        <label for="bajuInput">Foto Gamis / Baju:</label>
                        <input type="file" id="bajuInput" accept="image/*">
                    </div>
                    <div class="file-input-group">
                        <label for="sepatuInput">Foto Sepatu (Opsional):</label>
                        <input type="file" id="sepatuInput" accept="image/*">
                    </div>
                    <div class="file-input-group" style="grid-column: span 2;">
                        <label for="aksesorisInput">Foto Aksesoris (Kacamata/Payung/Tas):</label>
                        <input type="file" id="aksesorisInput" accept="image/*">
                    </div>
                </div>
            </div>

            <!-- Upload Karakter Utuh untuk Leonardo AI -->
            <div id="leonardoUploads" class="upload-section hidden">
                <h3 style="font-size: 0.95rem; margin-bottom: 10px; color: var(--accent-purple);">Unggah Model Karakter Utuh (Leonardo AI)</h3>
                <div class="file-input-group">
                    <label for="fullModelInput">Unggah 1 Foto Karakter Berbusana Lengkap:</label>
                    <input type="file" id="fullModelInput" accept="image/*">
                </div>
            </div>

            <button id="generateBtn" onclick="generateStoryboard()">Buat Storyboard & Video</button>
        </div>

        <div id="loading" class="hidden">Menafsirkan lirik & menyusun adegan...</div>

        <div id="resultContainer" class="hidden">
            <h2>Daftar Klip Video Hasil Render</h2>
            <div id="storyboardGrid"></div>
        </div>
    </div>
    <script src="/lyricshot/script.js"></script>
    <script>
        // Override fungsi durasi dengan kalkulasi menit & detik terformat bersih
        window.calculateDuration = function() {
            const lyrics = document.getElementById('lyricsInput').value.trim();
            const durationDisplay = document.getElementById('durationDisplay');
            if (!lyrics) {
                durationDisplay.classList.add('hidden');
                return;
            }
            const lines = lyrics.split(/(?:\r?\n|(?<=[a-z\.\s])(?=[A-Z])|(?=\([A-Za-z]))/g)
                                .map(line => line.trim())
                                .filter(line => line.length > 0);
                                
            const totalDuration = lines.length * 10;
            const minutes = Math.floor(totalDuration / 60);
            const seconds = totalDuration % 60;
            let timeString = `<strong>${totalDuration} detik</strong>`;
            if (minutes > 0) {
                timeString += ` (sekitar <strong>${minutes} menit ${seconds > 0 ? seconds + ' detik' : ''}</strong>)`;
            }
            durationDisplay.classList.remove('hidden');
            durationDisplay.innerHTML = `📊 <strong>Informasi Video Musik:</strong> Terdeteksi ${lines.length} baris lirik. Total durasi video otomatis disesuaikan menjadi ${timeString} (${lines.length} klip video x 10 detik).`;
        }
    </script>
</body>
</html>
